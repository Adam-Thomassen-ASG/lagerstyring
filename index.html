  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"af70d13b-08c0-435d-b118-6cfd64ce6c69\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>\nhtml,body{margin:0}\nbody{background:#eceae6;font-family:\"Helvetica Neue\",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;color:#23211e}\ninput,select,button,textarea{font-family:inherit;box-sizing:border-box}\ninput:focus,select:focus,textarea:focus{outline:2px solid #1E3A5F;outline-offset:-1px}\n::placeholder{color:#a8a49c}\n*{scrollbar-width:thin}\n@keyframes slideIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex; flex-direction:column; height:100vh; overflow:hidden; background:#eceae6\">\n\n  <!-- ===== Top bar ===== -->\n  <header style=\"flex:none; display:flex; align-items:center; gap:16px; padding:0 18px; height:56px; background:#16273d; color:#f4f3f1\">\n    <div style=\"display:flex; align-items:baseline; gap:9px\">\n      <span style=\"font-size:15px; font-weight:800; letter-spacing:-0.01em\">Lager<span style=\"opacity:.55; font-weight:500\">Pro<\u002Fspan><\u002Fspan>\n      <span style=\"font-size:10.5px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:#8ba3c0\">Kontorlager · ASG<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:2px; margin-left:8px\">\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.navn }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <input value=\"{{ query }}\" onchange=\"{{ onQuery }}\" placeholder=\"Søg navn, mærke, model, placering, tag …\" style=\"flex:1; max-width:420px; margin-left:auto; padding:8px 12px; font-size:13px; border:1px solid #2c405c; border-radius:7px; background:#0f1d30; color:#f4f3f1\">\n    <button onclick=\"{{ openSettings }}\" title=\"Kategorier &amp; tilstand\" style=\"width:36px; height:36px; flex:none; border:1px solid #2c405c; background:#1b2d46; color:#cdd9e8; border-radius:8px; cursor:pointer; font-size:15px; line-height:1\" style-hover=\"background:#22354f\">⚙<\u002Fbutton>\n    <button onclick=\"{{ exportCsv }}\" style=\"padding:8px 13px; font-size:12.5px; font-weight:600; border:1px solid #2c405c; background:#1b2d46; color:#cdd9e8; border-radius:7px; cursor:pointer\" style-hover=\"background:#22354f\">Eksportér CSV<\u002Fbutton>\n    <button onclick=\"{{ openAdd }}\" style=\"{{ addBtnStyle }}\" style-hover=\"filter:brightness(1.12)\">+ Ny vare<\u002Fbutton>\n    <div title=\"Adam Thomassen · IT admin\" style=\"display:flex; align-items:center; gap:9px; padding-left:6px; border-left:1px solid #2c405c\">\n      <div style=\"width:32px; height:32px; border-radius:50%; background:#3d5978; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700\">AT<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; line-height:1.2\">\n        <span style=\"font-size:12px; font-weight:700\">Adam Thomassen<\u002Fspan>\n        <span style=\"font-size:10px; color:#8ba3c0\">IT admin<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== KPI strip ===== -->\n  <div style=\"flex:none; display:flex; gap:1px; background:#dcd9d3; border-bottom:1px solid #d3cfc8\">\n    <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n      <div style=\"flex:1; background:#f6f5f2; padding:11px 16px; display:flex; flex-direction:column; gap:3px\">\n        <span style=\"font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#9a968f\">{{ k.label }}<\u002Fspan>\n        <span style=\"{{ k.valStyle }}\">{{ k.value }}<\u002Fspan>\n        <span style=\"font-size:10.5px; color:#a8a49c\">{{ k.sub }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ===== Body ===== -->\n  <div style=\"flex:1; display:flex; min-height:0\">\n\n    <!-- Filter rail -->\n    <aside style=\"width:216px; flex:none; background:#f6f5f2; border-right:1px solid #d9d5ce; overflow-y:auto; padding:14px 12px 24px\">\n      <div style=\"font-size:10px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:#9a968f; padding:0 6px 6px\">Kategori<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:1px; margin-bottom:16px\">\n        <sc-for list=\"{{ katFilter }}\" as=\"k\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ k.onClick }}\" style=\"{{ k.style }}\" style-hover=\"background:#eceae4\">\n            <span>{{ k.navn }}<\u002Fspan><span style=\"font-size:10.5px; color:#a8a49c; font-variant-numeric:tabular-nums\">{{ k.count }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"font-size:10px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:#9a968f; padding:0 6px 6px\">Tilstand<\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:5px; margin:0 6px 16px\">\n        <sc-for list=\"{{ tilstandFilter }}\" as=\"t\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.navn }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"font-size:10px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:#9a968f; padding:0 6px 6px\">Placering<\u002Fdiv>\n      <select value=\"{{ fPlac }}\" onchange=\"{{ onPlacFilter }}\" style=\"width:calc(100% - 12px); margin:0 6px 16px; padding:8px 10px; font-size:12.5px; border:1px solid #d3cfc8; border-radius:7px; background:#fff; color:#44413b\">\n        <sc-for list=\"{{ placFilterOptions }}\" as=\"o\" hint-placeholder-count=\"8\"><option value=\"{{ o.k }}\">{{ o.n }}<\u002Foption><\u002Fsc-for>\n      <\u002Fselect>\n\n      <button onclick=\"{{ resetFilters }}\" style=\"margin:0 6px; padding:7px 10px; font-size:12px; font-weight:600; color:#8a6d1f; background:transparent; border:1px dashed #d3b96a; border-radius:6px; cursor:pointer; width:calc(100% - 12px)\">Nulstil alle filtre<\u002Fbutton>\n    <\u002Faside>\n\n    <!-- Main panel -->\n    <main style=\"flex:1; display:flex; flex-direction:column; min-width:0; position:relative\">\n\n      <!-- ===== INVENTORY VIEW ===== -->\n      <sc-if value=\"{{ isLager }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex; flex-direction:column; min-height:0; flex:1\">\n          <!-- Toolbar -->\n          <div style=\"flex:none; display:flex; align-items:center; gap:14px; padding:10px 18px; background:#f2f0ec; border-bottom:1px solid #d9d5ce\">\n            <sc-if value=\"{{ hasSel }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; align-items:center; gap:10px; flex:1\">\n                <span style=\"font-size:12.5px; font-weight:700; color:#16273d\">{{ selCount }} valgt<\u002Fspan>\n                <button onclick=\"{{ bulkExport }}\" style=\"padding:5px 10px; font-size:12px; font-weight:600; border:1px solid #cdc8bf; background:#fff; border-radius:6px; cursor:pointer; color:#5a564f\" style-hover=\"background:#eceae4\">Eksportér valgte<\u002Fbutton>\n                <button onclick=\"{{ bulkDelete }}\" style=\"padding:5px 10px; font-size:12px; font-weight:600; border:1px solid #e3b7b7; background:#fff; border-radius:6px; cursor:pointer; color:#a33\" style-hover=\"background:#f7e2e2\">Slet valgte<\u002Fbutton>\n                <button onclick=\"{{ clearSel }}\" style=\"margin-left:auto; padding:5px 10px; font-size:12px; border:none; background:transparent; cursor:pointer; color:#9a968f\" style-hover=\"color:#23211e\">Ryd valg ✕<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noSel }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex; align-items:center; gap:16px; flex:1\">\n                <span style=\"font-size:12.5px; color:#5a564f\">{{ summaryTxt }}<\u002Fspan>\n                <div style=\"margin-left:auto; display:flex; align-items:center; gap:14px\">\n                  <button onclick=\"{{ toggleValue }}\" style=\"{{ valueToggleStyle }}\">{{ valueToggleLabel }}<\u002Fbutton>\n                  <div style=\"display:flex; align-items:center; gap:8px\">\n                    <span style=\"font-size:11px; color:#9a968f\">Tæthed<\u002Fspan>\n                    <sc-for list=\"{{ densityBtns }}\" as=\"d\" hint-placeholder-count=\"2\">\n                      <button onclick=\"{{ d.onClick }}\" style=\"{{ d.style }}\">{{ d.navn }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- Table -->\n          <div style=\"flex:1; overflow:auto; background:#eceae6\">\n            <div style=\"{{ tableWrapStyle }}\">\n              <!-- header -->\n              <div style=\"{{ headerRowStyle }}\">\n                <div style=\"display:flex; align-items:center; justify-content:center\"><input type=\"checkbox\" checked=\"{{ allSelected }}\" onchange=\"{{ toggleSelectAll }}\" style=\"accent-color:#1E3A5F; width:15px; height:15px\"><\u002Fdiv>\n                <sc-for list=\"{{ headers }}\" as=\"h\" hint-placeholder-count=\"7\">\n                  <div onclick=\"{{ h.onClick }}\" style=\"{{ h.style }}\"><span>{{ h.label }}<\u002Fspan><span style=\"color:#1E3A5F; font-size:9px\">{{ h.arrow }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <!-- rows -->\n              <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"10\">\n                <div style=\"{{ r.rowStyle }}\" style-hover=\"background:#f3f6fa\">\n                  <div style=\"display:flex; align-items:center; justify-content:center\"><input type=\"checkbox\" checked=\"{{ r.selected }}\" onchange=\"{{ r.onToggle }}\" style=\"accent-color:#1E3A5F; width:15px; height:15px\"><\u002Fdiv>\n                  <div onclick=\"{{ r.onOpen }}\" style=\"min-width:0; cursor:pointer\">\n                    <div style=\"font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#16273d\">{{ r.navn }}<\u002Fdiv>\n                    <div style=\"font-size:11px; color:#a8a49c; white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">{{ r.sub }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"color:#5a564f\">{{ r.kategori }}<\u002Fdiv>\n                  <div style=\"text-align:right; font-variant-numeric:tabular-nums; padding-right:12px\">{{ r.antalTxt }}<\u002Fdiv>\n                  <div><span style=\"{{ r.tilstandStyle }}\">{{ r.tilstand }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"font-size:12px; color:#5a564f\">{{ r.plac }}<\u002Fdiv>\n                  <sc-if value=\"{{ showValue }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"text-align:right; font-variant-numeric:tabular-nums; padding-right:10px; color:#16273d\">{{ r.vaerdiTxt }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div style=\"font-size:11px; color:#a8a49c\">{{ r.opdateretTxt }}<\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; justify-content:center\"><button onclick=\"{{ r.onOpen }}\" title=\"Detaljer\" style=\"width:26px; height:26px; border:none; background:transparent; border-radius:5px; cursor:pointer; color:#a8a49c; font-size:16px; line-height:1\" style-hover=\"background:#e6e3dd; color:#16273d\">›<\u002Fbutton><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding:56px 24px; text-align:center; color:#9a968f; font-size:13.5px\">Ingen varer matcher filtrene. <span onclick=\"{{ resetFilters }}\" style=\"color:#1E3A5F; font-weight:600; cursor:pointer; text-decoration:underline\">Nulstil<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== ANALYSE VIEW ===== -->\n      <sc-if value=\"{{ isAnalyse }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:1; overflow-y:auto; padding:22px 26px; background:#eceae6\">\n          <div style=\"display:grid; grid-template-columns:minmax(0,2fr) minmax(0,1fr); gap:18px; max-width:1100px\">\n            <div style=\"background:#fff; border:1px solid #d9d5ce; border-radius:10px; padding:18px 20px\">\n              <div style=\"font-size:13px; font-weight:700; color:#16273d; margin-bottom:14px\">Værdi pr. kategori<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:11px\">\n                <sc-for list=\"{{ catStats }}\" as=\"c\" hint-placeholder-count=\"6\">\n                  <div style=\"display:flex; align-items:center; gap:12px\">\n                    <span style=\"width:110px; flex:none; font-size:12.5px; color:#5a564f\">{{ c.navn }}<\u002Fspan>\n                    <div style=\"flex:1; height:18px; background:#f0eee9; border-radius:4px; overflow:hidden\"><div style=\"{{ c.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n                    <span style=\"width:96px; flex:none; text-align:right; font-size:12px; font-variant-numeric:tabular-nums; color:#16273d\">{{ c.vaerdiTxt }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:18px\">\n              <div style=\"background:#fff; border:1px solid #d9d5ce; border-radius:10px; padding:18px 20px\">\n                <div style=\"font-size:13px; font-weight:700; color:#16273d; margin-bottom:14px\">Mest brugte kasser<\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; gap:10px\">\n                  <sc-for list=\"{{ placStats }}\" as=\"p\" hint-placeholder-count=\"5\">\n                    <div style=\"display:flex; align-items:center; gap:10px\">\n                      <span style=\"width:10px; height:10px; border-radius:2px; flex:none; background:{{ p.color }}\"><\u002Fspan>\n                      <span style=\"flex:1; font-size:12.5px; color:#5a564f\">{{ p.navn }}<\u002Fspan>\n                      <span style=\"font-size:14px; font-weight:700; font-variant-numeric:tabular-nums; color:#16273d\">{{ p.count }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#fff; border:1px solid #d9d5ce; border-radius:10px; padding:18px 20px\">\n                <div style=\"font-size:13px; font-weight:700; color:#16273d; margin-bottom:4px\">Tilstandsfordeling<\u002Fdiv>\n                <div style=\"font-size:10.5px; color:#a8a49c; margin-bottom:14px\">Kun kategorier der sporer tilstand<\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; gap:9px\">\n                  <sc-for list=\"{{ tilstandStats }}\" as=\"t\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex; align-items:center; gap:10px\">\n                      <span style=\"width:66px; flex:none; font-size:12px; color:#5a564f\">{{ t.navn }}<\u002Fspan>\n                      <div style=\"flex:1; height:14px; background:#f0eee9; border-radius:3px; overflow:hidden\"><div style=\"{{ t.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n                      <span style=\"width:30px; flex:none; text-align:right; font-size:12px; font-variant-numeric:tabular-nums; color:#16273d\">{{ t.count }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== AKTIVITET VIEW ===== -->\n      <sc-if value=\"{{ isAktivitet }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:1; overflow-y:auto; padding:0; background:#eceae6\">\n          <div style=\"background:#fff\">\n            <div style=\"position:sticky; top:0; display:grid; grid-template-columns:150px minmax(180px,1.4fr) 140px 90px minmax(160px,1fr) 130px; padding:9px 18px; background:#f2f0ec; border-bottom:1px solid #d3cfc8; font-size:10px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:#9a968f\">\n              <div>Tidspunkt<\u002Fdiv><div>Vare<\u002Fdiv><div>Handling<\u002Fdiv><div style=\"text-align:right\">Ændring<\u002Fdiv><div>Note<\u002Fdiv><div>Bruger<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ aktivitet }}\" as=\"a\" hint-placeholder-count=\"12\">\n              <div style=\"display:grid; grid-template-columns:150px minmax(180px,1.4fr) 140px 90px minmax(160px,1fr) 130px; padding:9px 18px; border-bottom:1px solid #f1efeb; font-size:12.5px; align-items:center\">\n                <div style=\"font-size:11.5px; color:#a8a49c; font-variant-numeric:tabular-nums\">{{ a.ts }}<\u002Fdiv>\n                <div style=\"font-weight:600; color:#16273d; white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">{{ a.vare }}<\u002Fdiv>\n                <div><span style=\"{{ a.typeStyle }}\">{{ a.type }}<\u002Fspan><\u002Fdiv>\n                <div style=\"text-align:right; font-variant-numeric:tabular-nums; font-weight:600; color:{{ a.deltaColor }}\">{{ a.deltaTxt }}<\u002Fdiv>\n                <div style=\"color:#5a564f; white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">{{ a.note }}<\u002Fdiv>\n                <div style=\"color:#8a8680\">{{ a.bruger }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== Detail drawer ===== -->\n      <sc-if value=\"{{ detail }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closeDetail }}\" style=\"position:absolute; inset:0; background:rgba(20,30,45,0.28); z-index:20\"><\u002Fdiv>\n        <div style=\"position:absolute; top:0; right:0; bottom:0; width:440px; max-width:92%; background:#f6f5f2; z-index:21; box-shadow:-8px 0 30px rgba(0,0,0,0.16); display:flex; flex-direction:column; animation:slideIn .18s ease\">\n          <div style=\"flex:none; padding:16px 20px; background:#16273d; color:#f4f3f1; display:flex; align-items:flex-start; gap:10px\">\n            <div style=\"flex:1; min-width:0\">\n              <div style=\"font-size:11px; color:#8ba3c0; text-transform:uppercase; letter-spacing:0.06em\">{{ detail.kategori }}<\u002Fdiv>\n              <div style=\"font-size:16px; font-weight:700; line-height:1.25\">{{ detail.navn }}<\u002Fdiv>\n              <div style=\"font-size:12px; color:#a9bdd4; margin-top:2px\">{{ detail.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ closeDetail }}\" style=\"width:30px; height:30px; flex:none; border:none; background:rgba(255,255,255,0.12); border-radius:7px; color:#f4f3f1; font-size:17px; cursor:pointer; line-height:1\" style-hover=\"background:rgba(255,255,255,0.22)\">✕<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"flex:none; display:flex; gap:6px; padding:12px 20px; background:#213653; border-bottom:1px solid #2c405c\">\n            <button onclick=\"{{ openAdjust }}\" style=\"flex:1; padding:9px 6px; font-size:12px; font-weight:700; border:none; border-radius:7px; background:#f6f5f2; color:#16273d; cursor:pointer\" style-hover=\"filter:brightness(0.95)\">Justér antal<\u002Fbutton>\n            <button onclick=\"{{ editFromDetail }}\" style=\"flex:1; padding:9px 6px; font-size:12px; font-weight:700; border:1px solid #3d5978; border-radius:7px; background:transparent; color:#cdd9e8; cursor:pointer\" style-hover=\"background:#2c405c\">Redigér<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"flex:1; overflow-y:auto; padding:16px 20px 28px\">\n            <sc-if value=\"{{ detail.tracksTilstand }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex; gap:8px; margin-bottom:16px\">\n                <span style=\"{{ detail.tilstandStyle }}\">{{ detail.tilstand }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"background:#fff; border:1px solid #e2ded7; border-radius:9px; padding:4px 14px; margin:8px 0 18px\">\n              <sc-for list=\"{{ detail.fields }}\" as=\"f\" hint-placeholder-count=\"8\">\n                <div style=\"display:flex; justify-content:space-between; gap:14px; padding:8px 0; border-bottom:1px solid #f1efeb\">\n                  <span style=\"font-size:12px; color:#9a968f; flex:none\">{{ f.label }}<\u002Fspan>\n                  <span style=\"font-size:12.5px; color:#23211e; text-align:right; word-break:break-word\">{{ f.value }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:10px\">\n              <span style=\"font-size:10.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#9a968f\">Historik<\u002Fspan>\n              <div style=\"flex:1; height:1px; background:#e2ded7\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:0\">\n              <sc-for list=\"{{ detail.tx }}\" as=\"t\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex; gap:11px; padding:9px 0; border-bottom:1px solid #f1efeb\">\n                  <div style=\"width:8px; flex:none; display:flex; flex-direction:column; align-items:center; padding-top:4px\"><span style=\"width:8px; height:8px; border-radius:50%; background:{{ t.dot }}\"><\u002Fspan><\u002Fdiv>\n                  <div style=\"flex:1; min- ult&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Oversigt&quot;}}\">\nconst USER = 'Adam Thomassen';\n\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let saved = null;\n    try { saved = JSON.parse(localStorage.getItem('asg-lagerpro-v2')); } catch (e) {}\n    const seeded = this.seed();\n    const items = (saved && Array.isArray(saved.items) && saved.items.length) ? saved.items : seeded.items;\n    const kategorier = (saved && Array.isArray(saved.kategorier) && saved.kategorier.length) ? saved.kategorier : seeded.kategorier;\n    const distinct = (arr) => Array.from(new Set(arr)).filter(x => x && x !== '—').sort();\n    const maerker = (saved && Array.isArray(saved.maerker) && saved.maerker.length) ? saved.maerker : distinct(items.map(i => i.maerke));\n    const modeller = (saved && Array.isArray(saved.modeller) && saved.modeller.length) ? saved.modeller : distinct(items.map(i => i.model));\n    this.state = {\n      items, kategorier, maerker, modeller,\n      query: '', fKat: 'Alle', fTilstand: 'alle', fPlac: 'alle',\n      sortKey: 'navn', sortDir: 'asc',\n      sel: [], density: (props.taethed === 'Kompakt' ? 'Kompakt' : 'Komfortabel'),\n      showValue: props.visVaerdi !== false,\n      view: 'lager', detailId: null,\n      modal: null, form: null, formMore: false,\n      addMaerke: false, addModel: false, addKat: false,\n      draftMaerke: '', draftModel: '', draftKat: '',\n      adjust: null,\n      settingsOpen: false, newCatNavn: '', newCatTilstand: false\n    };\n  }\n\n  defaultKategorier() {\n    return [\n      { navn: 'Mus', tilstand: true }, { navn: 'Tastaturer', tilstand: true }, { navn: 'Skærme', tilstand: true },\n      { navn: 'Telefoner', tilstand: true }, { navn: 'Kabler', tilstand: false }, { navn: 'Opladere', tilstand: false },\n      { navn: 'Docks', tilstand: true }, { navn: 'Headsets', tilstand: true }, { navn: 'Adaptere', tilstand: false },\n      { navn: 'Strips & div ote || '',\n        oprettet: koeb, opdateret: tx[0].ts, tx\n      };\n    });\n    return { items, kategorier: this.defaultKategorier() };\n  }\n\n  nowISO() { return new Date().toISOString(); }\n  fmtKr(n) { return Math.round(n).toLocaleString('da-DK') + ' kr'; }\n  fmtDate(iso) { if (!iso) return '—'; const d = new Date(iso); if (isNaN(d)) return '—'; return d.toLocaleDateString('da-DK', { day: '2-digit', month: 'short', year: 'numeric' }); }\n  fmtDateTime(iso) { const d = new Date(iso); if (isNaN(d)) return iso; return d.toLocaleDateString('da-DK', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' ' + d.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit' }); }\n\n  catTracks(navn) { const c = this.state.kategorier.find(k => k.navn === navn); return c ? !!c.tilstand : false; }\n\n  persist(patch) {\n    const next = { ...this.state, ...patch };\n    this.setState(patch);\n    try { localStorage.setItem('asg-lagerpro-v2', JSON.stringify({ items: next.items, kategorier: next.kategorier, maerker: next.maerker, modeller: next.modeller })); } catch (e) {}\n  }\n  saveItems(items) { this.persist({ items }); }\n  update(id, fn) { this.saveItems(this.state.items.map(it => it.id === id ? fn(it) : it)); }\n\n  blankForm() {\n    const firstCat = this.state.kategorier[0] ? this.state.kategorier[0].navn : '';\n    return { id: null, navn: '', kategori: firstCat, maerke: '', model: '', serienr: '', antal: 1, enhed: 'stk', plac: 'Kasse 1', tilstand: 'Ny', leverandor: '', stykpris: 0, koebsdato: this.nowISO().slice(0, 10), garanti: '', tags: '', note: '' };\n  }\n  setForm(key, val) { this.setState(s => ({ form: { ...s.form, [key]: val } })); }\n\n  renderVals() {\n    const S = this.state;\n    const accent = this.props.accent ?? '#1E3A5F';\n    const zebra = this.props.zebra ?? true;\n    const showValue = S.showValue;\n    const condMeta = {\n      'Ny': { color: '#1F6E43', bg: '#E2F0E6' }, 'God': { color: '#2C5A8A', bg: '#E1ECF6' },\n      'Slidt': { color: '#8A6D1F', bg: '#F5EDD6' }, 'Defekt': { color: '#A33', bg: '#F7E2E2' }\n    };\n    const condStyle = (c) => ({ fontSize: '11px', fontWeight: 700, padding: '2px 8px', borderRadius: '5px', color: (condMeta[c] || condMeta.God).color, background: (condMeta[c] || condMeta.God).bg, whiteSpace: 'nowrap' });\n\n    const inputStyle = { padding: '9px 10px', fontSize: '13px', fontWeight: 400, border: '1px solid #d3cfc8', borderRadius: '7px', background: '#fff', width: '100%' };\n    const addBtnStyle = { padding: '10px 16px', fontSize: '13px', fontWeight: 700, border: 'none', borderRadius: '8px', cursor: 'pointer', background: accent, color: '#fff' };\n    const miniAddStyle = { flex: 'none', width: '40px', border: '1px solid ' + accent, background: '#fff', color: accent, borderRadius: '7px', cursor: 'pointer', fontSize: '18px', fontWeight: 700, lineHeight: 1 };\n    const miniOkStyle = { flex: 'none', padding: '0 12px', border: 'none', background: accent, color: '#fff', borderRadius: '7px', cursor: 'pointer', fontSize: '12px', fontWeight: 700 };\n    const miniCancelStyle = { flex: 'none', width: '40px', border: '1px solid #d3cfc8', background: '#fff', color: '#8a8680', borderRadius: '7px', cursor: 'pointer', fontSize: '14px' };\n\n    const conds = ['Ny', 'God', 'Slidt', 'Defekt'];\n    const katNavne = S.kategorier.map(k => k.navn);\n    const kasseOptions = Array.from({ length: 20 }, (_, i) => 'Kasse ' + (i + 1));\n\n    // ---- filtering ----\n    const q = S.query.trim().toLowerCase();\n    let list = S.items.filter(it => {\n      if (S.fKat !== 'Alle' && it.kategori !== S.fKat) return false;\n      if (S.fTilstand !== 'alle' && it.tilstand !== S.fTilstand) return false;\n      if (S.fPlac !== 'alle' && it.plac !== S.fPlac) return false;\n      if (q) {\n        const hay = (it.navn + ' ' + it.maerke + ' ' + it.model + ' ' + it.serienr + ' ' + it.plac + ' ' + it.tags.join(' ') + ' ' + it.note).toLowerCase();\n        if (!hay.includes(q)) return false;\n      }\
