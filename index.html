document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"1c46ca71-685f-4fad-a2e9-eda7f0a90713\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>\nhtml,body{margin:0; height:100%; color-scheme:light}\nbody{background:#eceae6;font-family:\"Helvetica Neue\",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;color:#23211e}\ninput,select,button,textarea{font-family:inherit;box-sizing:border-box}\ninput:focus,select:focus,textarea:focus{outline:2px solid #1E3A5F;outline-offset:-1px}\n::placeholder{color:#a8a49c}\n*{scrollbar-width:thin}\n@keyframes slideIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex; flex-direction:column; height:100dvh; overflow:hidden; background:#eceae6\">\n\n  <!-- ===== Mobile top bar ===== -->\n  <header style=\"flex:none; padding:10px 14px; background:#16273d; color:#f4f3f1; display:flex; flex-direction:column; gap:8px\">\n    <div style=\"display:flex; align-items:center; gap:8px\">\n      <span style=\"font-size:15px; font-weight:800; letter-spacing:-0.01em\">Lager<span style=\"opacity:.55; font-weight:500\">Pro<\u002Fspan><\u002Fspan>\n      <div style=\"margin-left:auto; display:flex; gap:8px\">\n        <button onclick=\"{{ openSettings }}\" title=\"Kategorier &amp; tilstand\" style=\"width:34px; height:34px; border:1px solid #2c405c; background:#1b2d46; color:#cdd9e8; border-radius:8px; cursor:pointer; font-size:15px; line-height:1\">⚙<\u002Fbutton>\n        <button onclick=\"{{ openAdd }}\" style=\"{{ addBtnStyle }}\">+ Ny<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:8px\">\n      <input value=\"{{ query }}\" onchange=\"{{ onQuery }}\" placeholder=\"Søg navn, mærke, model, kasse …\" style=\"flex:1; min-width:0; padding:9px 12px; font-size:14px; border:1px solid #2c405c; border-radius:8px; background:#0f1d30; color:#f4f3f1\">\n      <button onclick=\"{{ openMobileFilter }}\" style=\"{{ mobileFilterBtnStyle }}\">Filter{{ mobileFilterCountTxt }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"flex:none; padding:8px 14px; font-size:12px; color:#5a564f; background:#f2f0ec; border-bottom:1px solid #d9d5ce\">{{ summaryTxt }}<\u002Fdiv>\n\n  <!-- ===== Mobile Lager list ===== -->\n  <sc-if value=\"{{ isLager }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1; overflow-y:auto; padding:2px 14px 90px\">\n      <sc-for list=\"{{ mobileRows }}\" as=\"r\" hint-placeholder-count=\"8\">\n        <div style=\"{{ r.cardStyle }}\">\n          <div onclick=\"{{ r.onOpen }}\" style=\"flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; cursor:pointer\">\n            <div style=\"font-weight:700; color:#16273d; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">{{ r.navn }}<\u002Fdiv>\n            <div style=\"font-size:11.5px; color:#a8a49c; white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">{{ r.sub }}<\u002Fdiv>\n            <div style=\"display:flex; gap:8px; align-items:center; flex-wrap:wrap\">\n              <span style=\"font-size:11px; color:#8a8680\">{{ r.kategori }}<\u002Fspan>\n              <span style=\"font-size:11px; color:#8a8680\">· {{ r.plac }}<\u002Fspan>\n              <span style=\"{{ r.tilstandStyle }}\">{{ r.tilstand }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; flex:none\">\n            <button onclick=\"{{ r.onDec }}\" style=\"{{ stepperBtnStyle }}\">−<\u002Fbutton>\n            <span style=\"min-width:30px; text-align:center; font-weight:700; font-size:14px; font-variant-numeric:tabular-nums; color:#16273d\">{{ r.antal }}<\u002Fspan>\n            <button onclick=\"{{ r.onInc }}\" style=\"{{ stepperBtnStyle }}\">+<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:56px 24px; text-align:center; color:#9a968f; font-size:13.5px\">Ingen varer matcher filtrene. <span onclick=\"{{ resetFilters }}\" style=\"color:#1E3A5F; font-weight:600; cursor:pointer; text-decoration:underline\">Nulstil<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== Mobile Analyse ===== -->\n  <sc-if value=\"{{ isAnalyse }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"flex:1; overflow-y:auto; padding:14px 14px 90px; display:flex; flex-direction:column; gap:14px\">\n      <div style=\"background:#fff; border:1px solid #d9d5ce; border-radius:10px; padding:16px 16px\">\n        <div style=\"font-size:13px; font-weight:700; color:#16273d; margin-bottom:12px\">Værdi pr. kategori<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px\">\n          <sc-for list=\"{{ catStats }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; align-items:center; gap:10px\">\n              <span style=\"width:88px; flex:none; font-size:12px; color:#5a564f; white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">{{ c.navn }}<\u002Fspan>\n              <div style=\"flex:1; height:16px; background:#f0eee9; border-radius:4px; overflow:hidden\"><div style=\"{{ c.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"width:80px; flex:none; text-align:right; font-size:11.5px; font-variant-numeric:tabular-nums; color:#16273d\">{{ c.vaerdiTxt }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #d9d5ce; border-radius:10px; padding:16px 16px\">\n        <div style=\"font-size:13px; font-weight:700; color:#16273d; margin-bottom:12px\">Mest brugte kasser<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:9px\">\n          <sc-for list=\"{{ placStats }}\" as=\"p\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex; align-items:center; gap:10px\">\n              <span style=\"width:9px; height:9px; border-radius:2px; flex:none; background:{{ p.color }}\"><\u002Fspan>\n              <span style=\"flex:1; font-size:12.5px; color:#5a564f\">{{ p.navn }}<\u002Fspan>\n              <span style=\"font-size:13.5px; font-weight:700; font-variant-numeric:tabular-nums; color:#16273d\">{{ p.count }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #d9d5ce; border-radius:10px; padding:16px 16px\">\n        <div style=\"font-size:13px; font-weight:700; color:#16273d; margin-bottom:2px\">Tilstandsfordeling<\u002Fdiv>\n        <div style=\"font-size:10.5px; color:#a8a49c; margin-bottom:12px\">Kun kategorier der sporer tilstand<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px\">\n          <sc-for list=\"{{ tilstandStats }}\" as=\"t\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; gap:10px\">\n              <span style=\"width:56px; flex:none; font-size:12px; color:#5a564f\">{{ t.navn }}<\u002Fspan>\n              <div style=\"flex:1; height:12px; background:#f0eee9; border-radius:3px; overflow:hidden\"><div style=\"{{ t.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"width:26px; flex:none; text-align:right; font-size:12px; font-variant-numeric:tabular-nums; color:#16273d\">{{ t.count }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== Mobile Aktivitet ===== -->\n  <sc-if value=\"{{ isAktivitet }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"flex:1; overflow-y:auto; padding:10px 14px 90px; display:flex; flex-direction:column; gap:8px\">\n      <sc-for list=\"{{ aktivitet }}\" as=\"a\" hint-placeholder-count=\"10\">\n        <div style=\"background:#fff; border:1px solid #ece9e3; border-radius:9px; padding:10px 12px\">\n          <div style=\"display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:4px\">\n            <span style=\"font-weight:700; font-size:13px; color:#16273d; white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">{{ a.vare }}<\u002Fspan>\n            <span style=\"{{ a.typeStyle }}\">{{ a.type }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; align-items:center; gap:8px; font-size:11.5px; color:#8a8680\">\n            <span>{{ a.note }} · {{ a.bruger }}<\u002Fspan>\n            <span style=\"flex:none; font-variant-numeric:tabular-nums\">{{ a.ts }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== Mobile bottom nav ===== -->\n  <nav style=\"flex:none; display:flex; background:#16273d; padding-bottom:max(14px, env(safe-area-inset-bottom))\">\n    <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n      <button onclick=\"{{ t.onClick }}\" style=\"{{ t.mobileStyle }}\">{{ t.navn }}<\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fnav>\n<\u002Fdiv>\n\n<!-- Mobile filter sheet -->\n<sc-if value=\"{{ mobileFilterOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeMobileFilter }}\" style=\"position:fixed; inset:0; background:rgba(20,30,45,0.42); z-index:60\"><\u002Fdiv>\n  <div onclick=\"{{ stopProp }}\" style=\"position:fixed; left:0; right:0; bottom:0; max-height:82vh; overflow-y:auto; background:#f6f5f2; border-radius:16px 16px 0 0; z-index:61; padding:14px 18px calc(18px + env(safe-area-inset-bottom))\">\n    <div style=\"width:36px; height:4px; background:#d9d5ce; border-radius:2px; margin:0 auto 14px\"><\u002Fdiv>\n    <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:14px\">\n      <span style=\"font-size:15px; font-weight:700; color:#16273d\">Filtre<\u002Fspan>\n      <button onclick=\"{{ resetFilters }}\" style=\"border:none; background:transparent; color:#8a6d1f; font-size:12.5px; font-weight:600; cursor:pointer\">Nulstil alle<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"font-size:10px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:#9a968f; padding:0 2px 6px\">Kategori<\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column; gap:1px; margin-bottom:16px\">\n      <sc-for list=\"{{ katFilter }}\" as=\"k\" hint-placeholder-count=\"6\">\n        <button onclick=\"{{ k.onClick }}\" style=\"{{ k.style }}\">\n          <span>{{ k.navn }}<\u002Fspan><span style=\"font-size:10.5px; color:#a8a49c; font-variant-numeric:tabular-nums\">{{ k.count }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"font-size:10px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:#9a968f; padding:0 2px 6px\">Tilstand<\u002Fdiv>\n    <div style=\"display:flex; flex-wrap:wrap; gap:6px; margin:0 2px 16px\">\n      <sc-for list=\"{{ tilstandFilter }}\" as=\"t\" hint-placeholder-count=\"5\">\n        <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.navn }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"font-size:10px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:#9a968f; padding:0 2px 6px\">Placering<\u002Fdiv>\n    <div style=\"display:flex; flex-wrap:wrap; gap:6px; margin:0 0 18px\">\n      <sc-for list=\"{{ placChips }}\" as=\"p\" hint-placeholder-count=\"10\">\n        <button onclick=\"{{ p.onClick }}\" style=\"{{ p.style }}\">{{ p.navn }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <button onclick=\"{{ closeMobileFilter }}\" style=\"{{ addBtnStyle }}; width:100%\">Vis {{ filteredCount }} varer<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- Mobile detail sheet -->\n<sc-if value=\"{{ detail }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed; inset:0; background:#f6f5f2; z-index:65; display:flex; flex-direction:column\">\n    <div style=\"flex:none; padding:16px 18px; background:#16273d; color:#f4f3f1; display:flex; align-items:flex-start; gap:10px; padding-top:calc(16px + env(safe-area-inset-top))\">\n      <div style=\"flex:1; min-width:0\">\n        <div style=\"font-size:11px; color:#8ba3c0; text-transform:uppercase; letter-spacing:0.06em\">{{ detail.kategori }}<\u002Fdiv>\n        <div style=\"font-size:16px; font-weight:700; line-height:1.25\">{{ detail.navn }}<\u002Fdiv>\n        <div style=\"font-size:12px; color:#a9bdd4; margin-top:2px\">{{ detail.sub }}<\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ closeDetail }}\" style=\"width:34px; height:34px; flex:none; border:none; background:rgba(255,255,255,0.12); border-radius:8px; color:#f4f3f1; font-size:18px; cursor:pointer; line-height:1\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"flex:none; display:flex; gap:6px; padding:12px 18px; background:#213653\">\n      <button onclick=\"{{ openAdjust }}\" style=\"flex:1; padding:11px 6px; font-size:13px; font-weight:700; border:none; border-radius:8px; background:#f6f5f2; color:#16273d; cursor:pointer\">Justér antal<\u002Fbutton>\n      <button onclick=\"{{ editFromDetail }}\" style=\"flex:1; padding:11px 6px; font-size:13px; font-weight:700; border:1px solid #3d5978; border-radius:8px; background:transparent; color:#cdd9e8; cursor:pointer\">Redigér<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"flex:1; overflow-y:auto; padding:16px 18px 28px\">\n      <sc-if value=\"{{ detail.tracksTilstand }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex; gap:8px; margin-bottom:16px\"><span style=\"{{ detail.tilstandStyle }}\">{{ detail.tilstand }}<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"background:#fff; border:1px solid #e2ded7; border-radius:9px; padding:4px 14px; margin-bottom:18px\">\n        <sc-for list=\"{{ detail.fields }}\" as=\"f\" hint-placeholder-count=\"8\">\n          <div style=\"display:flex; justify-content:space-between; gap:14px; padding:9px 0; border-bottom:1px solid #f1efeb\">\n            <span style=\"font-size:12.5px; color:#9a968f; flex:none\">{{ f.label }}<\u002Fspan>\n            <span style=\"font-size:13px; color:#23211e; text-align:right; word-break:break-word\">{{ f.value }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:10px\">\n        <span style=\"font-size:10.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#9a968f\">Historik<\u002Fspan>\n        <div style=\"flex:1; height:1px; background:#e2ded7\"><\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ detail.tx }}\" as=\"t\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex; gap:11px; padding:10px 0; border-bottom:1px solid #f1efeb\">\n          <div style=\"width:8px; flex:none; display:flex; flex-direction:column; align-items:center; padding-top:4px\"><span style=\"width:8px; height:8px; border-radius:50%; background:{{ t.dot }}\"><\u002Fspan><\u002Fdiv>\n          <div style=\"flex:1; min-width:0\">\n            <div style=\"display:flex; justify-content:space-between; gap:8px\"><span style=\"font-size:13px; font-weight:600; color:#23211e\">{{ t.type }} <span style=\"color:{{ t.deltaColor }}; font-weight:700\">{{ t.deltaTxt }}<\u002Fspan><\u002Fspan><span style=\"font-size:11.5px; color:#a8a49c; flex:none\">{{ t.ts }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:12px; color:#8a8680\">{{ t.note }} · {{ t.bruger }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <button onclick=\"{{ deleteFromDetail }}\" style=\"margin-top:20px; padding:11px 14px; font-size:13px; font-weight:600; border:1px solid #e3b7b7; background:#fff; color:#a33; border-radius:8px; cursor:pointer; width:100%\">Slet vare permanent<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"display:flex; flex-direction:column; height:100vh; overflow:hidden; background:#eceae6\">\n\n  <!-- ===== Top bar ===== -->\n  <header style=\"flex:none; display:flex; align-items:center; gap:16px; padding:0 18px; height:56px; background:#16273d; color:#f4f3f1\">\n    <div style=\"display:flex; align-items:baseline; gap:9px\">\n      <span style=\"font-size:15px; font-weight:800; letter-spacing:-0.01em\">Lager<span style=\"opacity:.55; font-weight:500\">Pro<\u002Fspan><\u002Fspan>\n      <span style=\"font-size:10.5px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:#8ba3c0\">Kontorlager · ASG<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:2px; margin-left:8px\">\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.navn }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <input value=\"{{ query }}\" onchange=\"{{ onQuery }}\" placeholder=\"Søg navn, mærke, model, placering, tag …\" style=\"flex:1; max-width:420px; margin-left:auto; padding:8px 12px; font-size:13px; border:1px solid #2c405c; border-radius:7px; background:#0f1d30; color:#f4f3f1\">\n    <button onclick=\"{{ openSettings }}\" title=\"Kategorier &amp; tilstand\" style=\"width:36px; height:36px; flex:none; border:1px solid #2c405c; background:#1b2d46; color:#cdd9e8; border-radius:8px; cursor:pointer; font-size:15px; line-height:1\" style-hover=\"background:#22354f\">⚙<\u002Fbutton>\n    <button onclick=\"{{ exportCsv }}\" style=\"padding:8px 13px; font-size:12.5px; font-weight:600; border:1px solid #2c405c; background:#1b2d46; color:#cdd9e8; border-radius:7px; cursor:pointer\" style-hover=\"background:#22354f\">Eksportér CSV<\u002Fbutton>\n    <button onclick=\"{{ openAdd }}\" style=\"{{ addBtnStyle }}\" style-hover=\"filter:brightness(1.12)\">+ Ny vare<\u002Fbutton>\n    <div title=\"Adam Thomassen · IT admin\" style=\"display:flex; align-items:center; gap:9px; padding-left:6px; border-left:1px solid #2c405c\">\n      <div style=\"width:32px; height:32px; border-radius:50%; background:#3d5978; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700\">AT<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; line-height:1.2\">\n        <span style=\"font-size:12px; font-weight:700\">Adam Thomassen<\u002Fspan>\n        <span style=\"font-size:10px; color:#8ba3c0\">IT admin<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== KPI strip ===== -->\n  <div style=\"flex:none; display:flex; gap:1px; background:#dcd9d3; border-bottom:1px solid #d3cfc8\">\n    <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n      <div style=\"flex:1; background:#f6f5f2; padding:11px 16px; display:flex; flex-direction:column; gap:3px\">\n        <span style=\"font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#9a968f\">{{ k.label }}<\u002Fspan>\n        <span style=\"{{ k.valStyle }}\">{{ k.value }}<\u002Fspan>\n        <span style=\"font-size:10.5px; color:#a8a49c\">{{ k.sub }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ===== Body ===== -->\n  <div style=\"flex:1; display:flex; min-height:0\">\n\n    <!-- Filter rail -->\n    <aside style=\"width:216px; flex:none; background:#f6f5f2; border-right:1px solid #d9d5ce; overflow-y:auto; padding:14px 12px 24px\">\n      <div style=\"font-size:10px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:#9a968f; padding:0 6px 6px\">Kategori \"{{ form.note }}\" onchange=\"{{ set_note }}\" rows=\"2\" style=\"{{ inputStyle }}\"><\u002Ftextarea>\n          <\u002Flabel>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"position:sticky; bottom:0; background:#f6f5f2; border-top:1px solid #e2ded7; padding:14px 22px; display:flex; justify-content:flex-end; gap:9px\">\n        <button onclick=\"{{ closeModal }}\" style=\"padding:10px 16px; font-size:13px; font-weight:600; border:1px solid #cdc8bf; background:#fff; border-radius:8px; cursor:pointer; color:#5a564f\" style-hover=\"background:#eceae4\">Annullér<\u002Fbutton>\n        <button onclick=\"{{ saveForm }}\" style=\"{{ addBtnStyle }}\" style-hover=\"filter:brightness(1.12)\">{{ saveLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== Adjust modal ===== -->\n<sc-if value=\"{{ adjustOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeAdjust }}\" style=\"position:fixed; inset:0; background:rgba(20,30,45,0.42); display:flex; align-items:center; justify-content:center; z-index:70; padding:24px\">\n    <div onclick=\"{{ stopProp }}\" style=\"background:#f6f5f2; border-radius:12px; width:400px; max-width:100%; box-shadow:0 16px 50px rgba(0,0,0,0.24); overflow:hidden\">\n      <div style=\"background:#16273d; color:#f4f3f1; padding:16px 20px; font-size:15px; font-weight:700\">Justér beholdning<\u002Fdiv>\n      <div style=\"padding:20px; display:flex; flex-direction:column; gap:14px\">\n        <div style=\"font-size:12.5px; color:#5a564f\">{{ adjustNavn }} · nuværende: <strong>{{ adjustCurrent }}<\u002Fstrong><\u002Fdiv>\n        <div style=\"display:flex; gap:6px\">\n          <sc-for list=\"{{ adjustTypes }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.navn }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <label style=\"display:flex; flex-direction:column; gap:5px; font-size:11.5px; font-weight:600; color:#5a564f\">{{ adjustAntalLabel }}\n          <input type=\"number\" value=\"{{ adjustAntal }}\" onchange=\"{{ onAdjustAntal }}\" min=\"0\" style=\"{{ inputStyle }}\">\n        <\u002Flabel>\n        <label style=\"display:flex; flex-direction:column; gap:5px; font-size:11.5px; font-weight:600; color:#5a564f\">Note\n          <input value=\"{{ adjustNote }}\" onchange=\"{{ onAdjustNote }}\" placeholder=\"fx udleveret til ny kollega\" style=\"{{ inputStyle }}\">\n        <\u002Flabel>\n        <div style=\"font-size:12px; color:#8a8680\">Ny beholdning bliver: <strong style=\"color:#16273d\">{{ adjustResult }}<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid #e2ded7; padding:14px 20px; display:flex; justify-content:flex-end; gap:9px\">\n        <button onclick=\"{{ closeAdjust }}\" style=\"padding:10px 16px; font-size:13px; font-weight:600; border:1px solid #cdc8bf; background:#fff; border-radius:8px; cursor:pointer; color:#5a564f\">Annullér<\u002Fbutton>\n        <button onclick=\"{{ applyAdjust }}\" style=\"{{ addBtnStyle }}\">Bogfør<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== Kategorier / tilstand modal ===== -->\n<sc-if value=\"{{ settingsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeSettings }}\" style=\"position:fixed; inset:0; background:rgba(20,30,45,0.42); display:flex; align-items:center; justify-content:center; z-index:70; padding:24px\">\n    <div onclick=\"{{ stopProp }}\" style=\"background:#f6f5f2; border-radius:12px; width:480px; max-width:100%; max-height:88vh; overflow-y:auto; box-shadow:0 16px 50px rgba(0,0,0,0.24)\">\n      <div style=\"position:sticky; top:0; background:#16273d; color:#f4f3f1; padding:16px 20px; display:flex; justify-content:space-between; align-items:center\">\n        <span style=\"font-size:15px; font-weight:700\">Kategorier &amp; tilstand<\u002Fspan>\n        <button onclick=\"{{ closeSettings }}\" style=\"width:30px; height:30px; border:none; background:rgba(255,255,255,0.12); border-radius:7px; color:#f4f3f1; font-size:17px; cursor:pointer; line-height:1\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"padding:18px 20px\">\n        <div style=\"font-size:11.5px; color:#8a8680; margin-bottom:14px\">Slå <strong>Spor tilstand<\u002Fstrong> til for de kategorier hvor stand er relevant. Kun de kategorier får et tilstandsfelt på varerne.<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:2px; margin-bottom:18px\">\n          <sc-for list=\"{{ catRows }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; align-items:center; gap:12px; padding:9px 10px; background:#fff; border:1px solid #e2ded7; border-radius:8px\">\n              <span style=\"flex:1; font-size:13px; font-weight:600; color:#16273d\">{{ c.navn }}<\u002Fspan>\n              <span style=\"font-size:11px; color:#a8a49c; font-variant-numeric:tabular-nums\">{{ c.count }} varer<\u002Fspan>\n              <label style=\"display:flex; align-items:center; gap:7px; font-size:11.5px; color:#5a564f; cursor:pointer\">\n                <input type=\"checkbox\" checked=\"{{ c.tilstand }}\" onchange=\"{{ c.onToggle }}\" style=\"accent-color:#1E3A5F; width:15px; height:15px\"> Spor tilstand\n              <\u002Flabel>\n              <button onclick=\"{{ c.onDelete }}\" title=\"Slet kategori\" style=\"width:26px; height:26px; border:none; background:transparent; border-radius:5px; cursor:pointer; color:#c99; font-size:14px\" style-hover=\"background:#f7e2e2; color:#a33\">✕<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid #e2ded7; padding-top:14px; display:flex; align-items:flex-end; gap:10px\">\n          <label style=\"flex:1; display:flex; flex-direction:column; gap:5px; font-size:11.5px; font-weight:600; color:#5a564f\">Ny kategori\n            <input value=\"{{ newCatNavn }}\" onchange=\"{{ onNewCatNavn }}\" placeholder=\"fx Webcams\" style=\"{{ inputStyle }}\">\n          <\u002Flabel>\n          <label style=\"display:flex; align-items:center; gap:7px; font-size:11.5px; color:#5a564f; cursor:pointer; padding-bottom:10px\">\n            <input type=\"checkbox\" checked=\"{{ newCatTilstand }}\" onchange=\"{{ onNewCatTilstand }}\" style=\"accent-color:#1E3A5F; width:15px; height:15px\"> Tilstand\n          <\u002Flabel>\n          <button onclick=\"{{ addKategori }}\" style=\"{{ addBtnStyle }}\">Tilføj<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#1E3A5F&quot;, &quot;options&quot;: [&quot;#1E3A5F&quot;, &quot;#1F6E43&quot;, &quot;#5A452E&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Udseende&quot;}, &quot;taethed&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Komfortabel&quot;, &quot;options&quot;: [&quot;Komfortabel&quot;, &quot;Kompakt&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Udseende&quot;}, &quot;zebra&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Udseende&quot;}, &quot;visVaerdi&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Oversigt&quot;}}\">\nconst USER = 'Adam Thomassen';\n\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let saved = null;\n    try { saved = JSON.parse(localStorage.getItem('asg-lagerpro-v2')); } catch (e) {}\n    const seeded = this.seed();\n    const items = (saved && Array.isArray(saved.items) && saved.items.length) ? saved.items : seeded.items;\n    const kategorier = (saved && Array.isArray(saved.kategorier) && saved.kategorier.length) ? saved.kategorier : seeded.kategorier;\n    const distinct = (arr) => Array.from(new Set(arr)).filter(x => x && x !== '—').sort();\n    const maerker = (saved && Array.isArray(saved.maerker) && saved.maerker.length) ? saved.maerker : distinct(items.map(i => i.maerke));\n    const modeller = (saved && Array.isArray(saved.modeller) && saved.modeller.length) ? saved.modeller : distinct(items.map(i => i.model));\n    this.state = {\n      items, kategorier, maerker, modeller,\n      query: '', fKat: 'Alle', fTilstand: 'alle', fPlac: 'alle',\n      sortKey: 'navn', sortDir: 'asc',\n      sel: [], density: (props.taethed === 'Kompakt' ? 'Kompakt' : 'Komfortabel'),\n      showValue: props.visVaerdi !== false,\n      view: 'lager', detailId: null,\n      modal: null, form: null, formMore: false,\n      addMaerke: false, addModel: false, addKat: false,\n      draftMaerke: '', draftModel: '', draftKat: '',\n      adjust: null,\n      settingsOpen: false, newCatNavn: '', newCatTilstand: false,\n      isMobile: (typeof window !== 'undefined' ? window.innerWidth < 860 : false),\n      mobileFilterOpen: false\n    };\n  }\n\n  onResize = () => {\n    const m = window.innerWidth < 860;\n    if (m !== this.state.isMobile) this.setState({ isMobile: m });\n  };\n  componentDidMount() { window.addEventListener('resize', this.onResize); }\n  componentWillUnmount() { window.removeEventListener('resize', this.onResize); }\n\n  quickAdjust(id, delta) {\n    const now = this.nowISO();\n    this.update(id, it => {\n      const nyAntal = Math.max(0, it.antal + delta);\n      const d = nyAntal - it.antal;\n      if (d === 0) return it;\n      return { ...it, antal: nyAntal, opdateret: now, tx: [{ ts: now, type: d > 0 ? 'Tilgang' : 'Afgang', delta: d, note: 'Hurtig justering (mobil)', bruger: USER }, ...it.tx] };\n    });\n  }\n\n  defaultKategorier() {\n    return [\n      { navn: 'Mus', tilstand: true }, { navn: 'Tastaturer', tilstand: true }, { navn: 'Skærme', tilstand: true },\n      { navn: 'Telefoner', tilstand: true }, { navn: 'Kabler', tilstand: false }, { navn: 'Opladere', tilstand: false },\n      { navn: 'Docks', tilstand: true }, { navn: 'Headsets', tilstand: true }, { navn: 'Adaptere', tilstand: false },\n      { navn: 'Strips & div.', tilstand: false }\n    ];\n  }\n\n  seed() {\n    let id = 1;\n    // [navn, kat, maerke, model, antal, kasse(1-20), tilstand, lev, pris, koeb, garanti, tagsCsv, note, serial]\n    const T = [\n      ['Logitech MX Master 3S','Mus','Logitech','MX Master 3S',4,1,'Ny','Dustin',749,'2024-11-02','2026-11-02','ergonomi,bluetooth','Firmastandard til udviklere',''],\n      ['Logitech M185 trådløs','Mus','Logitech','M185',11,1,'God','Atea',129,'2024-06-14','2026-06-14','trådløs','',''],\n      ['Diverse kablede mus','Mus','Blandet','—',7,2,'Slidt','Intern',0,'2022-03-01','','reserve','Ældre modeller, virker',''],\n      ['Logitech MX Keys (DK)','Tastaturer','Logitech','MX Keys',3,3,'God','Dustin',949,'2024-09-10','2026-09-10','trådløs,dansk','',''],\n      ['Logitech K280e kablet','Tastaturer','Logitech','K280e',8,3,'God','Atea',179,'2024-02-20','2026-02-20','kablet,dansk','',''],\n      ['Defekte/ukendte tastaturer','Tastaturer','Blandet','—',5,4,'Defekt','Intern',0,'2021-01-01','','kassering','Test inden kassering',''],\n      ['Dell 27\" P2723DE','Skærme','Dell','P2723DE',5,5,'Ny','Proshop',2299,'2025-01-15','2028-01-15','usb-c,qhd','Docking-skærm','CN-P2723-0451'],\n      ['Dell 24\" P2422H','Skærme','Dell','P2422H',3,5,'God','Proshop',1499,'2024-04-08','2027-04-08','fhd','','CN-P2422-1180'],\n      ['Ældre 24\" skærme','Skærme','Blandet','—',4,6,'Slidt','Intern',0,'2020-05-01','','reserve','Kun VGA/DVI på et par',''],\n      ['iPhone 14 (brugte)','Telefoner','Apple','iPhone 14',3,7,'God','Elgiganten',4200,'2024-08-01','2026-08-01','ios,firmatelefon','Aflåst skab','IMEI-3567-8842'],\n      ['iPhone 11 (udfaset)','Telefoner','Apple','iPhone 11',6,7,'Slidt','Intern',0,'2020-09-01','','ios,udfaset','Skal nulstilles','IMEI-9921-0034'],\n      ['Android testtelefoner','Telefoner','Samsung','Galaxy A54',4,7,'God','Komplett',2899,'2024-10-05','2026-10-05','android,qa','Til test','IMEI-7712-5510'],\n      ['USB-C → USB-C 1m','Kabler','Anker','PowerLine',14,8,'Ny','Komplett',89,'2025-02-01','','usb-c','',''],\n      ['USB-C → Lightning','Kabler','Anker','—',3,8,'God','Komplett',119,'2024-11-20','','lightning','',''],\n      ['HDMI 2.0 1,5m','Kabler','Deltaco','—',9,9,'God','Dustin',59,'2024-07-01','','hdmi','',''],\n      ['Netværk Cat6 (blandet)','Kabler','Deltaco','—',22,9,'God','Dustin',35,'2024-03-15','','netværk','Diverse længder',''],\n      ['Gamle ukendte kabler','Kabler','Blandet','—',30,10,'God','Intern',0,'2019-01-01','','kassering','Mini-USB, VGA m.m.',''],\n      ['USB-C oplader 65W','Opladere','Anker','Nano II',6,11,'Ny','Komplett',329,'2025-01-10','2027-01-10','gan,usb-c','',''],\n      ['iPhone-opladere 20W','Opladere','Apple','—',8,11,'God','Elgiganten',149,'2024-05-01','','usb-c','',''],\n      ['Dell WD19S dock','Docks','Dell','WD19S',4,12,'God','Proshop',1099,'2024-06-01','2027-06-01','usb-c,dock','','DK-WD19-3321'],\n      ['Jabra Evolve2 40','Headsets','Jabra','Evolve2 40',5,13,'Ny','Dustin',649,'2025-02-14','2027-02-14','usb,teams','',''],\n      ['Brugte headsets','Headsets','Blandet','—',6,13,'Slidt','Intern',0,'2021-06-01','','hygiejne','Kassér — hygiejne',''],\n      ['USB-C → HDMI adapter','Adaptere','Deltaco','—',2,14,'God','Dustin',149,'2024-09-01','','usb-c,hdmi','',''],\n      ['Kabelstrips (pose á 100)','Strips & div.','—','—',3,15,'Ny','Komplett',49,'2025-01-05','','montage','','']\n    ];\n    const items = T.map((t) => {\n      const [navn, kat, maerke, model, antal, kasse, tilstand, lev, pris, koeb, garanti, tagsCsv, note, serial] = t;\n      const plac = 'Kasse ' + kasse;\n      const tx = [{ ts: koeb + 'T09:12:00', type: 'Oprettet', delta: antal, note: 'Modtaget fra ' + lev, bruger: 'System' }];\n      return {\n        id: id++, navn, kategori: kat, maerke, model, serienr: serial || '',\n        antal, enhed: 'stk', plac,\n        tilstand, leverandor: lev, stykpris: pris,\n        koebsdato: koeb, garanti: garanti || '',\n        tags: tagsCsv ? tagsCsv.split(',').map(s => s.trim()) : [], note: note || '',\n        oprettet: koeb, opdateret: tx[0].ts, tx\n      };\n    });\n    return { items, kategorier: this.defaultKategorier() };\n  }\n\n  nowISO() { return new Date().toISOString(); }\n  fmtKr(n) { return Math.round(n).toLocaleString('da-DK') + ' kr'; }\n  fmtDate(iso) { if (!iso) return '—'; const d = new Date(iso); if (isNaN(d)) return '—'; return d.toLocaleDateString('da-DK', { day: '2-digit', month: 'short', year: 'numeric' }); }\n  fmtDateTime(iso) { const d = new Date(iso); if (isNaN(d)) return iso; return d.toLocaleDateString('da-DK', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' ' + d.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit' }); }\n\n  catTracks(navn) { const c = this.state.kategorier.find(k => k.navn === navn); return c ? !!c.tilstand : false; }\n\n  persist(patch) {\n    const next = { ...this.state, ...patch };\n    this.setState(patch);\n    try { localStorage.setItem('asg-lagerpro-v2', JSON.stringify({ items: next.items, kategorier: next.kategorier, maerker: next.maerker, modeller: next.modeller })); } catch (e) {}\n  }\n  saveItems(items) { this.persist({ items }); }\n  update(id, fn) { this.saveItems(this.state.items.map(it => it.id === id ? fn(it) : it)); }\n\n  blankForm() {\n    const firstCat = this.state.kategorier[0] ? this.state.kategorier[0].navn : '';\n    return { id: null, navn: '', kategori: firstCat, maerke: '', model: '', serienr: '', antal: 1, enhed: 'stk', plac: 'Kasse 1', tilstand: 'Ny', leverandor: '', stykpris: 0, koebsdato: this.nowISO().slice(0, 10), garanti: '', tags: '', note: '' };\n  }\n  setForm(key, val) { this.setState(s => ({ form: { ...s.form, [key]: val } })); }\n\n  renderVals() {\n    const S = this.state;\n    const accent = this.props.accent ?? '#1E3A5F';\n    const zebra = this.props.zebra ?? true;\n    const showValue = S.showValue;\n    const condMeta = {\n      'Ny': { color: '#1F6E43', bg: '#E2F0E6' }, 'God': { color: '#2C5A8A', bg: '#E1ECF6' },\n      'Slidt': { color: '#8A6D1F', bg: '#F5EDD6' }, 'Defekt': { color: '#A33', bg: '#F7E2E2' }\n    };\n    const condStyle = (c) => ({ fontSize: '11px', fontWeight: 700, padding: '2px 8px', borderRadius: '5px', color: (condMeta[c] || condMeta.God).color, background: (condMeta[c] || condMeta.God).bg, whiteSpace: 'nowrap' });\n\n    const inputStyle = { padding: '9px 10px', fontSize: '13px', fontWeight: 400, border: '1px solid #d3cfc8', borderRadius: '7px', background: '#fff', width: '100%', colorScheme: 'light' };\n    const addBtnStyle = { padding: '10px 16px', fontSize: '13px', fontWeight: 700, border: 'none', borderRadius: '8px', cursor: 'pointer', background: accent, color: '#fff' };\n    const miniAddStyle = { flex: 'none', width: '40px', border: '1px solid ' + accent, background: '#fff', color: accent, borderRadius: '7px', cursor: 'pointer', fontSize: '18px', fontWeight: 700, lineHeight: 1 };\n    const miniOkStyle = { flex: 'none', padding: '0 12px', border: 'none', background: accent, color: '#fff', borderRadius: '7px', cursor: 'pointer', fontSize: '12px', fontWeight: 700 };\n    const miniCancelStyle = { flex: 'none', width: '40px', border: '1px solid #d3cfc8', background: '#fff', color: '#8a8680', borderRadius: '7px', cursor: 'pointer', fontSize: '14px' };\n\n    const conds = ['Ny', 'God', 'Slidt', 'Defekt'];\n    const katNavne = S.kategorier.map(k => k.navn);\n    const kasseOptions = Array.from({ length: 20 }, (_, i) => 'Kasse ' + (i + 1));\n\n    // ---- filtering ----\n    const q = S.query.trim().toLowerCase();\n    let list = S.items.filter(it => {\n      if (S.fKat !== 'Alle' && it.kategori !== S.fKat) return false;\n      if (S.fTilstand !== 'alle' && it.tilstand !== S.fTilstand) return false;\n      if (S.fPlac !== 'alle' && it.plac !== S.fPlac) return false;\n      if (q) {\n        const hay = (it.navn + ' ' + it.maerke + ' ' + it.model + ' ' + it.serienr + ' ' + it.plac + ' ' + it.tags.join(' ') + ' ' + it.note).toLowerCase();\n        if (!hay.includes(q)) return false;\n      }\n      return true;\n    });\n\n    // ---- sorting ----\n    const sortVal = (it) => {\n      switch (S.sortKey) {\n        case 'navn': return it.navn.toLowerCase();\n        case 'kategori': return it.kategori;\n        case 'antal': return it.antal;\n        case 'tilstand': return conds.indexOf(it.tilstand);\n        case 'plac': return it.plac;\n        case 'vaerdi': return it.antal * it.stykpris;\n        case 'opdateret': return it.opdateret;\n        default: return it.navn;\n      }\n    };\n    list = list.slice().sort((a, b) => {\n      const va = sortVal(a), vb = sortVal(b);\n      let c = (va < vb) ? -1 : (va > vb) ? 1 : 0;\n      return S.sortDir === 'asc' ? c : -c;\n    });\n\n    const rowPadV = S.density === 'Kompakt' ? '5px' : '10px';\n    const rowFont = S.density === 'Kompakt' ? '12px' : '13px';\n    const cols = ['34px', 'minmax(200px,1.6fr)', '140px', '90px', '124px', '124px'];\n    if (showValue) cols.push('120px');\n    cols.push('124px', '40px');\n    const gridCols = cols.join(' ');\n    const tableMinWidth = showValue ? 1040 : 940;\n\n    const rows = list.map((it, idx) => {\n      const tracks = this.catTracks(it.kategori);\n      return {\n        ...it,\n        selected: S.sel.includes(it.id),\n        sub: (it.maerke && it.maerke !== '—' ? it.maerke : '') + (it.model && it.model !== '—' ? ' · ' + it.model : ''),\n        antalTxt: it.antal + ' ' + it.enhed,\n        vaerdiTxt: this.fmtKr(it.antal * it.stykpris),\n        opdateretTxt: this.fmtDate(it.opdateret),\n        tilstand: tracks ? it.tilstand : '—',\n        tilstandStyle: tracks ? condStyle(it.tilstand) : { fontSize: '12px', color: '#c9c5bd' },\n        rowStyle: { display: 'grid', gridTemplateColumns: gridCols, alignItems: 'center', padding: rowPadV + ' 10px', borderBottom: '1px solid #f1efeb', fontSize: rowFont, background: (zebra && idx % 2 ? '#faf9f6' : '#fff') },\n        onToggle: (e) => { e.stopPropagation(); this.setState(st => ({ sel: st.sel.includes(it.id) ? st.sel.filter(x => x !== it.id) : [...st.sel, it.id] })); },\n        onOpen: () => this.setState({ detailId: it.id })\n      };\n    });\n\n    // ---- headers ----\n    const headerDefs = [\n      { key: 'navn', label: 'Vare' }, { key: 'kategori', label: 'Kategori' },\n      { key: 'antal', label: 'Antal', num: true }, { key: 'tilstand', label: 'Tilstand' },\n      { key: 'plac', label: 'Placering' }\n    ];\n    if (showValue) headerDefs.push({ key: 'vaerdi', label: 'Værdi', num: true });\n    headerDefs.push({ key: 'opdateret', label: 'Opdateret' }, { key: null, label: '' });\n    const headers = headerDefs.map(h => ({\n      label: h.label,\n      arrow: (h.key && S.sortKey === h.key) ? (S.sortDir === 'asc' ? '▲' : '▼') : '',\n      onClick: h.key ? () => this.setState(st => ({ sortKey: h.key, sortDir: st.sortKey === h.key && st.sortDir === 'asc' ? 'desc' : 'asc' })) : null,\n      style: { display: 'flex', alignItems: 'center', gap: '4px', justifyContent: h.num ? 'flex-end' : 'flex-start', padding: '9px 4px', fontSize: '10px', fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: '#8a8680', cursor: h.key ? 'pointer' : 'default', userSelect: 'none' }\n    }));\n\n    // ---- KPIs ----\n    const totEnh = S.items.reduce((a, i) => a + i.antal, 0);\n    const totVaerdi = S.items.reduce((a, i) => a + i.antal * i.stykpris, 0);\n    const kpiVal = { fontSize: '19px', fontWeight: 800, color: '#16273d', fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.01em' };\n    const kpis = [\n      { label: 'Varenumre', value: String(S.items.length), sub: 'i systemet', valStyle: kpiVal },\n      { label: 'Enheder i alt', value: totEnh.toLocaleString('da-DK'), sub: 'stk registreret', valStyle: kpiVal }\n    ];\n    if (showValue) kpis.push({ label: 'Samlet værdi', value: this.fmtKr(totVaerdi), sub: 'anskaffelse', valStyle: kpiVal });\n    kpis.push({ label: 'Kategorier', value: String(S.kategorier.length), sub: S.kategorier.filter(k => k.tilstand).length + ' med tilstand', valStyle: kpiVal });\n\n    // ---- sidebar filters ----\n    const sideBtn = (active) => ({ display: 'flex', justifyContent: 'space-between', alignItems: 'center', width: '100%', padding: '6px 8px', fontSize: '12.5px', border: 'none', borderRadius: '6px', cursor: 'pointer', textAlign: 'left', background: active ? '#e6ecf3' : 'transparent', color: active ? accent : '#44413b', fontWeight: active ? 700 : 400 });\n    const pill = (active) => ({ padding: '5px 10px', fontSize: '11.5px', borderRadius: '14px', cursor: 'pointer', border: '1px solid ' + (active ? accent : '#d3cfc8'), background: active ? accent : '#fff', color: active ? '#fff' : '#5a564f', fontWeight: active ? 700 : 500 });\n\n    // ---- detail ----\n    const dItem = S.detailId ? S.items.find(i => i.id === S.detailId) : null;\n    let detail = null;\n    if (dItem) {\n      const tracks = this.catTracks(dItem.kategori);\n      const fields = [\n        { label: 'Kategori', value: dItem.kategori },\n        { label: 'Antal', value: dItem.antal + ' ' + dItem.enhed },\n        { label: 'Placering', value: dItem.plac }\n      ];\n      if (showValue) {\n        fields.push({ label: 'Stykpris', value: this.fmtKr(dItem.stykpris) });\n        fields.push({ label: 'Lagerværdi', value: this.fmtKr(dItem.antal * dItem.stykpris) });\n      }\n      fields.push(\n        { label: 'Serienr.', value: dItem.serienr || '—' },\n        { label: 'Leverandør', value: dItem.leverandor || '—' },\n        { label: 'Købsdato', value: this.fmtDate(dItem.koebsdato) },\n        { label: 'Garanti', value: this.fmtDate(dItem.garanti) },\n        { label: 'Tags', value: dItem.tags.length ? dItem.tags.join(', ') : '—' },\n        { label: 'Note', value: dItem.note || '—' },\n        { label: 'Oprettet', value: this.fmtDate(dItem.oprettet) }\n      );\n      detail = {\n        kategori: dItem.kategori, navn: dItem.navn,\n        sub: [dItem.maerke, dItem.model].filter(x => x && x !== '—').join(' · '),\n        tracksTilstand: tracks, tilstand: dItem.tilstand, tilstandStyle: { ...condStyle(dItem.tilstand), fontSize: '11.5px', padding: '4px 10px' },\n        fields,\n        tx: dItem.tx.map(t => ({\n          type: t.type, ts: this.fmtDateTime(t.ts), note: t.note, bruger: t.bruger,\n          deltaTxt: t.delta > 0 ? '+' + t.delta : (t.delta < 0 ? String(t.delta) : ''),\n          deltaColor: t.delta > 0 ? '#1F6E43' : (t.delta < 0 ? '#A33' : '#8a8680'),\n          dot: t.type === 'Oprettet' ? '#3E8E5A' : (t.type === 'Afgang' ? '#A33' : (t.type === 'Tilgang' ? '#3E8E5A' : '#C9832E'))\n        }))\n      };\n    }\n\n    // ---- analyse ----\n    const catAgg = {};\n    S.items.forEach(i => { catAgg[i.kategori] = (catAgg[i.kategori] || 0) + i.antal * i.stykpris; });\n    const catArr = Object.keys(catAgg).map(k => ({ navn: k, vaerdi: catAgg[k] })).sort((a, b) => b.vaerdi - a.vaerdi);\n    const catMax = Math.max(1, ...catArr.map(c => c.vaerdi));\n    const catStats = catArr.map(c => ({ navn: c.navn, vaerdiTxt: this.fmtKr(c.vaerdi), barStyle: { height: '100%', width: Math.max(2, c.vaerdi / catMax * 100) + '%', background: accent, borderRadius: '4px' } }));\n    const placAgg = {};\n    S.items.forEach(i => { placAgg[i.plac] = (placAgg[i.plac] || 0) + 1; });\n    const placStats = Object.keys(placAgg).map(k => ({ navn: k, count: placAgg[k] })).sort((a, b) => b.count - a.count).slice(0, 6).map(p => ({ ...p, color: accent }));\n    const condCount = conds.map(c => S.items.filter(i => i.tilstand === c && this.catTracks(i.kategori)).length);\n    const condMax = Math.max(1, ...condCount);\n    const tilstandStats = conds.map((c, i) => ({ navn: c, count  },\n      clearSel: () => this.setState({ sel: [] }),\n      allSelected: list.length > 0 && list.every(i => S.sel.includes(i.id)),\n      toggleSelectAll: () => { const ids = list.map(i => i.id); const all = ids.every(id => S.sel.includes(id)); this.setState({ sel: all ? S.sel.filter(id => !ids.includes(id)) : Array.from(new Set([...S.sel, ...ids])) }); },\n      // table\n      tableWrapStyle: { minWidth: tableMinWidth + 'px', background: '#fff' },\n      headerRowStyle: { position: 'sticky', top: 0, zIndex: 5, display: 'grid', gridTemplateColumns: gridCols, alignItems: 'center', background: '#f2f0ec', borderBottom: '1px solid #d3cfc8', padding: '0 10px' },\n      headers, rows, noResults: list.length === 0,\n      // detail\n      detail, closeDetail: () => this.setState({ detailId: null }),\n      openAdjust: () => this.setState({ adjust: { id: S.detailId, type: 'Afgang', antal: 1, note: '' } }),\n      editFromDetail: () => { const it = S.items.find(i => i.id === S.detailId); this.setState({ modal: 'edit', form: { ...it, tags: it.tags.join(', ') }, formMore: true, addMaerke: false, addModel: false, addKat: false }); },\n      deleteFromDetail: () => { if (confirm('Slet \"' + dItem.navn + '\" permanent?')) this.persist({ items: S.items.filter(i => i.id !== S.detailId), detailId: null }); },\n      // analyse\n      catStats, placStats, tilstandStats,\n      // aktivitet\n      aktivitet,\n      // modal\n      modalOpen: !!S.modal, modalTitle: S.modal === 'edit' ? 'Redigér vare' : 'Ny vare', saveLabel: S.modal === 'edit' ? 'Gem ændringer' : 'Opret vare',\n      closeModal: () => this.setState({ modal: null, form: null }),\n      stopProp: e => e.stopPropagation(),\n      form,\n      formTracksTilstand: formTracks, formTracksTilstandNot: !formTracks,\n      formMore: S.formMore, toggleMore: () => this.setState(st => ({ formMore: !st.formMore })),\n      moreLabel: S.formMore ? '− Skjul flere detaljer' : '+ Flere detaljer (pris, leverandør, garanti …)',\n      k
