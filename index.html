    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"17b68363-ba22-494a-9db2-fd92275a8fbe\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1\">\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-status-bar-style\" content=\"default\">\n<meta name=\"apple-mobile-web-app-title\" content=\"Lager\">\n<meta name=\"theme-color\" content=\"#1E3A5F\">\n\n<style>\nhtml,body{margin:0}\nbody{background:#f4f3f1;font-family:\"Helvetica Neue\",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}\ninput,select,button{font-family:inherit;box-sizing:border-box;max-width:100%}\ninput:focus,select:focus{outline:2px solid #1E3A5F;outline-offset:-1px}\n::placeholder{color:#9a968f}\n.hscroll{-webkit-overflow-scrolling:touch;scrollbar-width:none}\n.hscroll::-webkit-scrollbar{display:none}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex; flex-direction:column; height:100vh; overflow:hidden; color:#23211e\">\n\n  <!-- ===== MOBILE header ===== -->\n  <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"flex:none; background:#ffffff; border-bottom:1px solid #e4e1dc; padding:calc(12px + env(safe-area-inset-top)) 14px 10px; display:flex; flex-direction:column; gap:10px\">\n      <div style=\"display:flex; align-items:center; gap:10px\">\n        <div style=\"flex:1; min-width:0\">\n          <div style=\"font-size:16px; font-weight:700; letter-spacing:-0.01em\">Lager · Kontoret<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#8a8680; margin-top:1px\">{{ totalAntal }} enheder · {{ visteVarer }} vist<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ openManage }}\" title=\"Administrér\" style=\"width:40px; height:40px; flex:none; border:1px solid #d8d4cd; background:#ffffff; border-radius:9px; font-size:17px; cursor:pointer; color:#5a564f\">⚙<\u002Fbutton>\n        <button onclick=\"{{ openModal }}\" style=\"{{ addBtnStyleMobile }}\">+ Ny<\u002Fbutton>\n      <\u002Fdiv>\n      <input value=\"{{ query }}\" onchange=\"{{ onQuery }}\" placeholder=\"Søg navn, kategori, placering …\" style=\"width:100%; box-sizing:border-box; padding:11px 12px; font-size:16px; border:1px solid #d8d4cd; border-radius:9px; background:#faf9f7\">\n      <div class=\"hscroll\" style=\"display:flex; gap:7px; overflow-x:auto; margin:0 -14px; padding:0 14px 2px\">\n        <sc-for list=\"{{ katList }}\" as=\"k\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ k.onClick }}\" style=\"{{ k.chipStyle }}\">{{ k.navn }} <span style=\"opacity:.6\">{{ k.count }}<\u002Fspan><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:6px\">\n        <sc-for list=\"{{ statusList }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ s.onClick }}\" style=\"{{ s.segStyle }}\">{{ s.navn }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <label style=\"display:flex; align-items:center; gap:8px; font-size:13px; color:#5a564f\">\n        <input type=\"checkbox\" checked=\"{{ lowOnly }}\" onchange=\"{{ toggleLowOnly }}\" style=\"accent-color:#1E3A5F; width:17px; height:17px\">\n        Kun lav beholdning <span style=\"color:#a3552e; margin-left:auto; font-weight:700\">{{ lavCount }} lav<\u002Fspan>\n      <\u002Flabel>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== content row ===== -->\n  <div style=\"flex:1; display:flex; min-height:0\">\n\n    <!-- Desktop sidebar -->\n    <sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ true }}\">\n      <aside style=\"width:232px; flex:none; background:#ffffff; border-right:1px solid #e4e1dc; display:flex; flex-direction:column; overflow-y:auto\">\n        <div style=\"padding:20px 20px 14px; border-bottom:1px solid #eeece8\">\n          <div style=\"font-size:15px; font-weight:700; letter-spacing:-0.01em\">Lager · Kontoret<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#8a8680; margin-top:3px\">{{ totalAntal }} enheder · {{ totalVarer }} varenumre<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:14px 12px 6px\">\n          <div style=\"display:flex; justify-content:space-between; align-items:center; padding:0 8px 6px\">\n            <span style=\"font-size:10.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#9a968f\">Kategori<\u002Fspan>\n            <button onclick=\"{{ openManage }}\" title=\"Administrér kategorier og placeringer\" style=\"border:none; background:transparent; cursor:pointer; color:#b0aca4; font-size:14px; padding:0\" style-hover=\"color:#5a564f\">⚙<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:1px\">\n            <sc-for list=\"{{ katList }}\" as=\"k\" hint-placeholder-count=\"6\">\n              <button onclick=\"{{ k.onClick }}\" style=\"{{ k.style }}\" style-hover=\"background:#f1efeb\">\n                <span>{{ k.navn }}<\u002Fspan>\n                <span style=\"font-size:11px; color:#9a968f; font-variant-numeric:tabular-nums\">{{ k.count }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:14px 12px 6px\">\n          <div style=\"font-size:10.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#9a968f; padding:0 8px 6px\">Status<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:1px\">\n            <sc-for list=\"{{ statusList }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ s.onClick }}\" style=\"{{ s.style }}\" style-hover=\"background:#f1efeb\">\n                <span style=\"display:flex; align-items:center; gap:8px\"><span style=\"{{ s.dotStyle }}\"><\u002Fspan>{{ s.navn }}<\u002Fspan>\n                <span style=\"font-size:11px; color:#9a968f; font-variant-numeric:tabular-nums\">{{ s.count }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:14px 20px\">\n          <label style=\"display:flex; align-items:center; gap:8px; font-size:12.5px; color:#5a564f; cursor:pointer\">\n            <input type=\"checkbox\" checked=\"{{ lowOnly }}\" onchange=\"{{ toggleLowOnly }}\" style=\"accent-color:#1E3A5F; width:15px; height:15px\">\n            Kun lav beholdning\n          <\u002Flabel>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:auto; padding:16px 20px; border-top:1px solid #eeece8; font-size:11px; color:#b0aca4; line-height:1.5\">Gemmes lokalt i browseren.<br>Assets med serienr. hører til i Snipe-IT.<\u002Fdiv>\n      <\u002Faside>\n    <\u002Fsc-if>\n\n    <!-- Main -->\n    <main style=\"flex:1; display:flex; flex-direction:column; min-width:0\">\n\n      <sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <header style=\"flex:none; display:flex; align-items:center; gap:12px; padding:14px 24px; background:#ffffff; border-bottom:1px solid #e4e1dc\">\n            <input value=\"{{ query }}\" onchange=\"{{ onQuery }}\" placeholder=\"Søg efter navn, kategori eller placering …\" style=\"flex:1; max-width:440px; padding:9px 12px; font-size:13.5px; border:1px solid #d8d4cd; border-radius:6px; background:#faf9f7\">\n            <div style=\"flex:1\"><\u002Fdiv>\n            <button onclick=\"{{ openManage }}\" style=\"padding:9px 14px; font-size:13px; font-weight:600; border:1px solid #d8d4cd; background:#ffffff; border-radius:6px; cursor:pointer; color:#5a564f\" style-hover=\"background:#f1efeb\">Administrér<\u002Fbutton>\n            <button onclick=\"{{ openModal }}\" style=\"{{ addBtnStyle }}\" style-hover=\"filter:brightness(1.15)\">+ Ny vare<\u002Fbutton>\n          <\u002Fheader>\n          <div style=\"flex:none; display:flex; gap:24px; padding:14px 24px 0; align-items:baseline\">\n            <div style=\"font-size:13px; color:#5a564f\"><strong style=\"font-variant-numeric:tabular-nums\">{{ visteVarer }}<\u002Fstrong> varer vist<\u002Fdiv>\n            <div style=\"font-size:13px; color:#a3552e\"><strong style=\"font-variant-numeric:tabular-nums\">{{ lavCount }}<\u002Fstrong> under min. beholdning<\u002Fdiv>\n            <div style=\"font-size:13px; color:#8a8680\"><strong style=\"font-variant-numeric:tabular-nums\">{{ udCount }}<\u002Fstrong> kan smides ud<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Tabel-visning -->\n      <sc-if value=\"{{ isTabel }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"flex:1; overflow:auto; padding:12px 24px 32px\">\n          <div style=\"background:#ffffff; border:1px solid #e4e1dc; border-radius:8px; overflow:hidden; min-width:840px\">\n            <div style=\"display:grid; grid-template-columns:minmax(180px,1.4fr) 110px 150px minmax(120px,1fr) 190px 36px; gap:12px; align-items:center; padding:9px 16px; border-bottom:1px solid #e4e1dc; background:#faf9f7; font-size:10.5px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:#9a968f\">\n              <div>Vare<\u002Fdiv><div>Kategori<\u002Fdiv><div>Antal<\u002Fdiv><div>Placering<\u002Fdiv><div>Status<\u002Fdiv><div><\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"8\">\n              <div style=\"display:grid; grid-template-columns:minmax(180px,1.4fr) 110px 150px minmax(120px,1fr) 190px 36px; gap:12px; align-items:center; padding:10px 16px; border-bottom:1px solid #f1efeb\" style-hover=\"background:#fbfaf8\">\n                <div style=\"min-width:0\">\n                  <div style=\"font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">{{ r.navn }}<\u002Fdiv>\n                  <sc-if value=\"{{ r.note }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:11.5px; color:#9a968f; white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">{{ r.note }}<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"font-size:12.5px; color:#5a564f\">{{ r.kat }}<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:6px\">\n                  <button onclick=\"{{ r.dec }}\" style=\"width:26px; height:26px; border:1px solid #d8d4cd; background:#ffffff; border-radius:5px; font-size:14px; cursor:pointer; color:#5a564f; line-height:1\" style-hover=\"background:#f1efeb\">−<\u002Fbutton>\n                  <span style=\"{{ r.antalStyle }}\">{{ r.antal }}<\u002Fspan>\n                  <button onclick=\"{{ r.inc }}\" style=\"width:26px; height:26px; border:1px solid #d8d4cd; background:#ffffff; border-radius:5px; font-size:14px; cursor:pointer; color:#5a564f; line-height:1\" style-hover=\"background:#f1efeb\">+<\u002Fbutton>\n                  <sc-if value=\"{{ r.lav }}\" hint-placeholder-val=\"{{ false }}\"><span title=\"Under min. beholdning\" style=\"font-size:10px; font-weight:700; color:#a3552e; background:#f7e8de; padding:2px 6px; border-radius:4px\">LAV<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"font-size:12.5px; color:#5a564f; font-family:ui-monospace,Menlo,monospace\">{{ r.plac }}<\u002Fdiv>\n                <div style=\"display:flex; gap:3px\">\n                  <sc-for list=\"{{ r.statusBtns }}\" as=\"b\" hint-placeholder-count=\"3\">\n                    <button onclick=\"{{ b.onClick }}\" title=\"{{ b.title }}\" style=\"{{ b.style }}\">{{ b.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <button onclick=\"{{ r.del }}\" title=\"Slet vare\" style=\"width:26px; height:26px; border:none; background:transparent; border-radius:5px; cursor:pointer; color:#c4c0b8; font-size:15px; line-height:1\" style-hover=\"background:#f7e2e2; color:#a33\">×<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:48px 24px; text-align:center; color:#9a968f; font-size:13.5px\">Ingen varer matcher. Prøv en anden søgning eller nulstil filtre.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Kort-visning (også mobil) -->\n      <sc-if value=\"{{ isKort }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:1; overflow-y:auto; padding:12px 14px calc(32px + env(safe-area-inset-bottom))\">\n          <div style=\"{{ cardGridStyle }}\">\n            <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"8\">\n              <div style=\"background:#ffffff; border:1px solid #e4e1dc; border-radius:10px; padding:14px; display:flex; flex-direction:column; gap:11px\">\n                <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:8px\">\n                  <div style=\"min-width:0\">\n                    <div style=\"font-size:14.5px; font-weight:600; line-height:1.3\">{{ r.navn }}<\u002Fdiv>\n                    <div style=\"font-size:12px; color:#9a968f; margin-top:2px\">{{ r.kat }} · <span style=\"font-family:ui-monospace,Menlo,monospace\">{{ r.plac }}<\u002Fspan><\u002Fdiv>\n                    <sc-if value=\"{{ r.note }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:11.5px; color:#b0aca4; margin-top:2px\">{{ r.note }}<\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <button onclick=\"{{ r.del }}\" title=\"Slet vare\" style=\"width:32px; height:32px; flex:none; border:none; background:transparent; border-radius:7px; cursor:pointer; color:#c4c0b8; font-size:17px; line-height:1\" style-hover=\"background:#f7e2e2; color:#a33\">×<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px\">\n                  <button onclick=\"{{ r.dec }}\" style=\"{{ r.stepStyle }}\" style-hover=\"background:#f1efeb\">−<\u002Fbutton>\n                  <span style=\"{{ r.antalStyleStor }}\">{{ r.antal }}<\u002Fspan>\n                  <button onclick=\"{{ r.inc }}\" style=\"{{ r.stepStyle }}\" style-hover=\"background:#f1efeb\">+<\u002Fbutton>\n                  <sc-if value=\"{{ r.lav }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px; font-weight:700; color:#a3552e; background:#f7e8de; padding:3px 7px; border-radius:5px\">LAV<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"display:flex; gap:5px\">\n                  <sc-for list=\"{{ r.statusBtns }}\" as=\"b\" hint-placeholder-count=\"3\">\n                    <button onclick=\"{{ b.onClick }}\" title=\"{{ b.title }}\" style=\"{{ b.styleGrow }}\">{{ b.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:48px 24px; text-align:center; color:#9a968f; font-size:13.5px\">Ingen varer matcher. Prøv en anden søgning eller nulstil filtre.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== Modal: Ny vare ===== -->\n<sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeModal }}\" style=\"position:fixed; inset:0; background:rgba(30,28,25,0.4); display:flex; align-items:flex-end; justify-content:center; z-index:50\" style-hover=\"\">\n    <div onclick=\"{{ stopProp }}\" style=\"{{ sheetStyle }}\">\n      <div style=\"font-size:16px; font-weight:700\">Ny vare<\u002Fdiv>\n      <label style=\"display:flex; flex-direction:column; gap:5px; font-size:12px; font-weight:600; color:#5a564f\">Navn\n        <input value=\"{{ fNavn }}\" onchange=\"{{ onFNavn }}\" placeholder=\"fx USB-C oplader 65W\" style=\"padding:11px; font-size:16px; font-weight:400; border:1px solid #d8d4cd; border-radius:8px\">\n      <\u002Flabel>\n      <div style=\"display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:12px\">\n        <div style=\"display:flex; flex-direction:column; gap:5px; font-size:12px; font-weight:600; color:#5a564f\">Kategori\n          <div style=\"position:relative\">\n            <button type=\"button\" onclick=\"{{ toggleKatDrop }}\" style=\"{{ dropTriggerStyle }}\">\n              <span style=\"overflow:hidden; text-overflow:ellipsis; white-space:nowrap\">{{ fKat }}<\u002Fspan>\n              <span style=\"color:#9a968f; flex:none\">▾<\u002Fspan>\n            <\u002Fbutton>\n            <sc-if value=\"{{ katDropOpen }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"{{ dropPanelStyle }}\">\n                <sc-for list=\"{{ katPicks }}\" as=\"o\" hint-placeholder-count=\"6\">\n                  <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\" style-hover=\"background:#f1efeb\">{{ o.navn }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:5px; font-size:12px; font-weight:600; color:#5a564f\">Placering\n          <div style=\"position:relative\">\n            <button type=\"button\" onclick=\"{{ togglePlacDrop }}\" style=\"{{ dropTriggerStyle }}\">\n              <span style=\"overflow:hidden; text-overflow:ellipsis; white-space:nowrap\">{{ fPlac }}<\u002Fspan>\n              <span style=\"color:#9a968f; flex:none\">▾<\u002Fspan>\n            <\u002Fbutton>\n            <sc-if value=\"{{ placDropOpen }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"{{ dropPanelStyle }}\">\n                <sc-for list=\"{{ placPicks }}\" as=\"o\" hint-placeholder-count=\"6\">\n                  <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\" style-hover=\"background:#f1efeb\">{{ o.navn }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:11.5px; color:#b0aca4; margin-top:-4px\">Mangler en kategori eller placering? Opret den under <span onclick=\"{{ openManage }}\" style=\"color:#1E3A5F; font-weight:600; cursor:pointer; text-decoration:underline\">Administrér<\u002Fspan>.<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:12px\">\n        <label style=\"display:flex; flex-direction:column; gap:5px; font-size:12px; font-weight:600; color:#5a564f\">Antal\n          <input type=\"number\" value=\"{{ fAntal }}\" onchange=\"{{ onFAntal }}\" min=\"0\" style=\"padding:11px; font-size:16px; font-weight:400; border:1px solid #d8d4cd; border-radius:8px\">\n        <\u002Flabel>\n        <label style=\"display:flex; flex-direction:column; gap:5px; font-size:12px; font-weight:600; color:#5a564f\">Min. beholdning\n          <input type=\"number\" value=\"{{ fMin }}\" onchange=\"{{ onFMin }}\" min=\"0\" style=\"padding:11px; font-size:16px; font-weight:400; border:1px solid #d8d4cd; border-radius:8px\">\n        <\u002Flabel>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:flex-end; gap:8px; margin-top:4px\">\n        <button onclick=\"{{ closeModal }}\" style=\"padding:11px 16px; font-size:14px; font-weight:600; border:1px solid #d8d4cd; background:#ffffff; border-radius:8px; cursor:pointer; color:#5a564f\" style-hover=\"background:#f1efeb\">Annullér<\u002Fbutton>\n        <button onclick=\"{{ saveItem }}\" style=\"{{ addBtnStyle }}\" style-hover=\"filter:brightness(1.15)\">Gem vare<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== Modal: Administrér ===== -->\n<sc-if value=\"{{ manageOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeManage }}\" style=\"position:fixed; inset:0; background:rgba(30,28,25,0.4); display:flex; align-items:flex-end; justify-content:center; z-index:50\">\n    <div onclick=\"{{ stopProp }}\" style=\"{{ manageSheetStyle }}\">\n      <div style=\"display:flex; justify-content:space-between; align-items:center\">\n        <div style=\"font-size:16px; font-weight:700\">Administrér<\u002Fdiv>\n        <button onclick=\"{{ closeManage }}\" style=\"width:32px; height:32px; border:none; background:transparent; cursor:pointer; color:#9a968f; font-size:19px; line-height:1\" style-hover=\"color:#23211e\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px; color:#8a8680; margin-top:-6px\">Opret og fjern de kategorier og placeringer, du kan vælge imellem, når du opretter en vare.<\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:{{ manageCols }}; gap:20px\">\n        <!-- Kategorier -->\n        <div>\n          <div style=\"font-size:10.5px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:#9a968f; margin-bottom:8px\">Kategorier<\u002Fdiv>\n          <div style=\"display:flex; gap:7px; margin-bottom:10px\">\n            <input value=\"{{ newKat }}\" onchange=\"{{ onNewKat }}\" onkeydown=\"{{ onKatKey }}\" placeholder=\"Ny kategori\" style=\"flex:1; min-width:0; padding:9px 10px; font-size:15px; border:1px solid #d8d4cd; border-radius:7px\">\n            <button onclick=\"{{ addKat }}\" style=\"{{ addSmallStyle }}\">Tilføj<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:5px; max-height:230px; overflow-y:auto\">\n            <sc-for list=\"{{ manageKatList }}\" as=\"k\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex; align-i s:center; gap:8px\">\n                  <span style=\"font-size:11px; color:#b0aca4\">{{ p.count }} varer<\u002Fspan>\n                  <button onclick=\"{{ p.onDelete }}\" title=\"Fjern\" style=\"width:26px; height:26px; border:none; background:transparent; border-radius:5px; cursor:pointer; color:#c4c0b8; font-size:15px; line-height:1\" style-hover=\"background:#f7e2e2; color:#a33\">×<\u002Fbutton>\n                <\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; justify-content:flex-end; margin-top:4px\">\n        <button onclick=\"{{ closeManage }}\" style=\"{{ addBtnStyle }}\" style-hover=\"filter:brightness(1.15)\">Færdig<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;visning&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Tabel&quot;, &quot;options&quot;: [&quot;Tabel&quot;, &quot;Kort&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Layout&quot;}, &quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#1E3A5F&quot;, &quot;options&quot;: [&quot;#1E3A5F&quot;, &quot;#1F6E43&quot;, &quot;#5A452E&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Farver&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let saved = null;\n    try { saved = JSON.parse(localStorage.getItem('asg-lager-v3')); } catch (e) {}\n    const defPlac = Array.from({ length: 18 }, (_, i) => 'Kasse ' + (i + 1));\n    const defKat = ['Mus', 'Tastaturer', 'Skærme', 'Telefoner', 'Kabler', 'Opladere', 'Docks', 'Headsets', 'Adaptere', 'Strips & div.'];\n    const items = (saved && Array.isArray(saved.items) && saved.items.length) ? saved.items : this.seed();\n    const kategorier = (saved && Array.isArray(saved.kategorier) && saved.kategorier.length) ? saved.kategorier : defKat;\n    const placeringer = (saved && Array.isArray(saved.placeringer) && saved.placeringer.length) ? saved.placeringer : defPlac;\n    this.state = {\n      items, kategorier, placeringer,\n      query: '', kat: 'Alle', status: 'alle', lowOnly: false,\n      isMobile: (typeof window !== 'undefined' && window.innerWidth < 760),\n      modalOpen: false, manageOpen: false,\n      fNavn: '', fKat: kategorier[0], fPlac: placeringer[0], fAntal: 1, fMin: 0,\n      newKat: '', newPlac: '', openDrop: null\n    };\n    this._onResize = () => {\n      const m = window.innerWidth < 760;\n      if (m !== this.state.isMobile) this.setState({ isMobile: m });\n    };\n  }\n\n  componentDidMount() { window.addEventListener('resize', this._onResize); this._onResize(); }\n  componentWillUnmount() { window.removeEventListener('resize', this._onResize); }\n\n  seed() {\n    let id = 1;\n    const mk = (navn, kat, antal, min, plac, status, note) => ({ id: id++, navn, kat, antal, min, plac: 'Kasse ' + plac, status, note: note || '' });\n    return [\n      mk('Logitech MX Master 3S', 'Mus', 4, 2, 1, 'bruges'),\n      mk('Logitech M185 (trådløs)', 'Mus', 11, 4, 1, 'bruges'),\n      mk('Diverse mus m. kabel', 'Mus', 7, 0, 2, 'maaske', 'Blandet, ældre modeller'),\n      mk('Logitech MX Keys (DK)', 'Tastaturer', 3, 2, 3, 'bruges'),\n      mk('Logitech K280e (kablet)', 'Tastaturer', 8, 3, 3, 'bruges'),\n      mk('Tastaturer, defekte/ukendte', 'Tastaturer', 5, 0, 4, 'ud', 'Test inden kassering'),\n      mk('Dell 27\" P2723DE', 'Skærme', 5, 2, 5, 'bruges'),\n      mk('Dell 24\" P2422H', 'Skærme', 3, 1, 5, 'bruges'),\n      mk('Ældre 24\" skærme (blandet)', 'Skærme', 4, 0, 6, 'maaske', 'Kun VGA/DVI på et par stk.'),\n      mk('iPhone 14 (brugte)', 'Telefoner', 3, 1, 7, 'bruges'),\n      mk('iPhone 11 (udfaset)', 'Telefoner', 6, 0, 7, 'maaske', 'Skal nulstilles'),\n      mk('Android testtelefoner', 'Telefoner', 4, 2, 7, 'bruges', 'Til QA'),\n      mk('USB-C → USB-C 1m', 'Kabler', 14, 6, 8, 'bruges'),\n      mk('USB-C → Lightning', 'Kabler', 5, 4, 8, 'bruges'),\n      mk('HDMI 2.0 1,5m', 'Kabler', 9, 3, 9, 'bruges'),\n      mk('DisplayPort → DP', 'Kabler', 6, 2, 9, 'bruges'),\n      mk('Netværkskabler Cat6 (div. længder)', 'Kabler', 22, 8, 10, 'bruges'),\n      mk('Gamle kabler, uidentificerede', 'Kabler', 30, 0, 11, 'ud', 'Mini-USB, VGA m.m.'),\n      mk('USB-C oplader 65W', 'Opladere', 6, 3, 12, 'bruges'),\n      mk('iPhone-opladere (5W/20W)', 'Opladere', 8, 3, 12, 'bruges'),\n      mk('Laptopopladere, blandede', 'Opladere', 9, 0, 13, 'maaske', 'Match med maskiner først'),\n      mk('Dell WD19S dock', 'Docks', 4, 2, 14, 'bruges'),\n      mk('Ældre docks (USB 3.0)', 'Docks', 3, 0, 14, 'maaske'),\n      mk('Jabra Evolve2 40', 'Headsets', 5, 2, 15, 'bruges'),\n      mk('Diverse headsets, brugte', 'Headsets', 6, 0, 15, 'ud', 'Hygiejne — kassér'),\n      mk('USB-C → HDMI adapter', 'Adaptere', 4, 3, 16, 'bruges'),\n      mk('USB-A → C adaptere', 'Adaptere', 10, 4, 16, 'bruges'),\n      mk('Kabelstrips (pose á 100)', 'Strips & div.', 3, 2, 17, 'bruges'),\n      mk('Velcrobånd, ruller', 'Strips & div.', 2, 1, 17, 'bruges'),\n      mk('Diverse beslag og skruer', 'Strips & div.', 1, 0, 18, 'maaske')\n    ];\n  }\n\n  persist(patch) {\n    const next = { ...this.state, ...patch };\n    this.setState(patch);\n    try { localStorage.setItem('asg-lager-v3', JSON.stringify({ items: next.items, kategorier: next.kategorier, placeringer: next.placeringer })); } catch (e) {}\n  }\n\n  saveItems(items) { this.persist({ items }); }\n  update(id, fn) { this.saveItems(this.state.items.map(it => it.id === id ? fn(it) : it)); }\n\n  renderVals() {\n    const S = this.state;\n    const accent = this.props.accent ?? '#1E3A5F';\n    const visning = this.props.visning ?? 'Tabel';\n    const isMobile = S.isMobile;\n    const isDesktop = !isMobile;\n    const statusMeta = {\n      bruges: { label: 'Bruges', title: 'Skal bruges', color: '#1F6E43', bg: '#E2F0E6' },\n      maaske: { label: 'Måske', title: 'Skal måske bruges', color: '#8A6D1F', bg: '#F5EDD6' },\n      ud:     { label: 'Ud',     title: 'Kan smides ud',   color: '#8A8680', bg: '#EDEBE7' }\n    };\n\n    const q = S.query.trim().toLowerCase();\n    const stepStyle = { width: isMobile ? '46px' : '30px', height: isMobile ? '46px' : '30px', border: '1px solid #d8d4cd', background: '#ffffff', borderRadius: '9px', fontSize: isMobile ? '20px' : '15px', cursor: 'pointer', color: '#5a564f', lineHeight: 1, flex: 'none' };\n\n    const rows = S.items.filter(it =>\n      (S.kat === 'Alle' || it.kat === S.kat) &&\n      (S.status === 'alle' || it.status === S.status) &&\n      (!S.lowOnly || (it.min > 0 && it.antal < it.min)) &&\n      (!q || (it.navn + ' ' + it.kat + ' ' + it.plac + ' ' + (it.note || '')).toLowerCase().includes(q))\n    ).map(it => {\n      const lav = it.min > 0 && it.antal < it.min;\n      const numStyle = { minWidth: '34px', textAlign: 'center', fontVariantNumeric: 'tabular-nums', fontWeight: 600, color: lav ? '#a3552e' : '#23211e' };\n      return {\n        ...it, lav, stepStyle,\n        antalStyle: { ...numStyle, fontSize: '13.5px' },\n        antalStyleStor: { ...numStyle, fontSize: isMobile ? '20px' : '17px' },\n        inc: () => this.update(it.id, x => ({ ...x, antal: x.antal + 1 })),\n        dec: () => this.update(it.id, x => ({ ...x, antal: Math.max(0, x.antal - 1) })),\n        del: () => { if (confirm('Slet \"' + it.navn + '\" fra lageret?')) this.saveItems(S.items.filter(x => x.id !== it.id)); },\n        statusBtns: Object.keys(statusMeta).map(key => {\n          const m = statusMeta[key], active = it.status === key;\n          const base = {\n            fontSize: isMobile ? '13px' : '11px', fontWeight: 700, borderRadius: isMobile ? '8px' : '5px', cursor: 'pointer',\n            border: '1px solid ' + (active ? 'transparent' : '#e0ddd6'),\n            background: active ? m.bg : '#ffffff', color: active ? m.color : '#b0aca4'\n          };\n          return {\n            label: m.label, title: m.title,\n            onClick: () => this.update(it.id, x => ({ ...x, status: key })),\n            style: { ...base, padding: '4px 9px' },\n            styleGrow: { ...base, flex: 1, padding: isMobile ? '10px 4px' : '5px 4px' }\n          };\n        })\n      };\n    });\n\n    const kats = ['Alle', ...S.kategorier];\n    const sideBtn = (active) => ({\n      display: 'flex', justifyContent: 'space-between', alignItems: 'center', width: '100%',\n      padding: '7px 10px', fontSize: '13px', border: 'none', borderRadius: '6px', cursor: 'pointer',\n      textAlign: 'left', background: active ? '#ECEFF3' : 'transparent',\n      color: active ? accent : '#44413b', fontWeight: active ? 700 : 400\n    });\n    const chip = (active) => ({\n      flex: 'none', padding: '8px 13px', fontSize: '13px', borderRadius: '20px', cursor: 'pointer', whiteSpace: 'nowrap',\n      border: '1px solid ' + (active ? accent : '#dcd8d1'),\n      background: active ? accent : '#ffffff', color: active ? '#ffffff' : '#5a564f', fontWeight: active ? 700 : 500\n    });\n\n    const statusDefs = [\n      { key: 'alle', navn: 'Alle', dot: '#c4c0b8' },\n      { key: 'bruges', navn: 'Skal bruges', short: 'Bruges', dot: '#1F6E43' },\n      { key: 'maaske', navn: 'Måske', short: 'Måske', dot: '#C9A227' },\n      { key: 'ud', navn: 'Kan smides ud', short: 'Ud', dot: '#9a968f' }\n    ];\n    const seg = (active) => ({\n      flex: 1, padding: '9px 4px', fontSize: '12.5px', borderRadius: '8px', cursor: 'pointer', whiteSpace: 'nowrap',\n      border: '1px solid ' + (active ? accent : '#dcd8d1'),\n      background: active ? accent : '#ffffff', color: active ? '#ffffff' : '#5a564f', fontWeight: active ? 700 : 500\n    });\n\n    const countKat = (k) => k === 'Alle' ? S.items.length : S.items.filter(i => i.kat === k).length;\n    const countPlac = (p) => S.items.filter(i => i.plac === p).length;\n\n    return {\n      isMobile, isDesktop,\n      totalAntal: S.items.reduce((a, i) => a + i.antal, 0),\n      totalVarer: S.items.length,\n      visteVarer: rows.length,\n      lavCount: S.items.filter(i => i.min > 0 && i.antal < i.min).length,\n      udCount: S.items.filter(i => i.status === 'ud').length,\n      rows, noResults: rows.length === 0,\n      isTabel: isDesktop && visning !== 'Kort',\n      isKort: isMobile || (isDesktop && visning === 'Kort'),\n      cardGridStyle: { display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(auto-fill,minmax(230px,1fr))', gap: '12px' },\n      query: S.query, lowOnly: S.lowOnly,\n      onQuery: e => this.setState({ query: e.target.value }),\n      toggleLowOnly: () => this.setState({ lowOnly: !S.lowOnly }),\n      katList: kats.map(k => ({\n        navn: k, count: countKat(k),\n        onClick: () => this.setState({ kat: k }),\n        style: sideBtn(S.kat === k), chipStyle: chip(S.kat === k)\n      })),\n      statusList: statusDefs.map(s => ({\n        navn: isMobile ? (s.short || s.navn) : s.navn, count: s.key === 'alle' ? S.items.length : S.items.filter(i => i.status === s.key).length,\n        onClick: () => this.setState({ status: s.key }),\n        style: sideBtn(S.status === s.key), segStyle: seg(S.status === s.key),\n        dotStyle: { width: '8px', height: '8px', borderRadius: '50%', background: s.dot, flex: 'none' }\n      })),\n      addBtnStyle: { padding: '11px 16px', fontSize: '14px', fontWeight: 700, border: 'none', borderRadius: '8px', cursor: 'pointer', background: accent, color: '#ffffff' },\n      addBtnStyleMobile: { padding: '0 16px', height: '40px', flex: 'none', fontSize: '14px', fontWeight: 700, border: 'none', borderRadius: '9px', cursor: 'pointer', background: accent, color: '#ffffff' },\n      addSmallStyle: { flex: 'none', padding: '0 14px', fontSize: '13px', fontWeight: 700, border: 'none', borderRadius: '7px', cursor: 'pointer', background: accent, color: '#ffffff' },\n      sheetStyle: {\n        backgroun
