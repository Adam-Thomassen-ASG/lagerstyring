document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"7ab53856-6d82-4ae7-bdd2-32dec782e04e\"><\u002Fscript>\n<script src=\"49f64602-b6a6-4bac-9dbe-654f76c6948b\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>\n:root{\n  --bg:#eceae6; --panel:#f6f5f2; --surface:#fff; --track:#f0eee9; --zebra:#faf9f6;\n  --border:#d9d5ce; --border-soft:#f1efeb;\n  --text:#23211e; --heading:#16273d; --text-secondary:#5a564f; --muted:#a8a49c;\n  color-scheme: light;\n}\n:root[data-theme=\"dark\"]{\n  --bg:#14171b; --panel:#1d2126; --surface:#242830; --track:#2c3038; --zebra:#292d34;\n  --border:#343941; --border-soft:#2b2f36;\n  --text:#e7e5e1; --heading:#f1f0ee; --text-secondary:#b7b3ab; --muted:#8d8a84;\n  color-scheme: dark;\n}\nhtml,body{margin:0; height:100%}\nbody{background:var(--bg);font-family:\"Helvetica Neue\",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;color:var(--text)}\ninput,select,button,textarea{font-family:inherit;box-sizing:border-box}\ninput:focus,select:focus,textarea:focus{outline:2px solid #1E3A5F;outline-offset:-1px}\n::placeholder{color:var(--muted)}\n*{scrollbar-width:thin}\n@keyframes slideIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<sc-if value=\"{{ loggedIn }}\" hint-placeholder-val=\"{{ false }}\">\n\n<sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex; flex-direction:column; height:100dvh; overflow:hidden; background:var(--bg)\">\n\n  <!-- ===== Mobile top bar ===== -->\n  <header style=\"flex:none; padding:10px 14px; background:#16273d; color:#f4f3f1; display:flex; flex-direction:column; gap:8px\">\n    <div style=\"display:flex; align-items:center; gap:8px\">\n      <span style=\"font-size:15px; font-weight:800; letter-spacing:-0.01em\">Digi<span style=\"opacity:.55; font-weight:500\"> lager<\u002Fspan><\u002Fspan>\n      <div style=\"margin-left:auto; display:flex; gap:8px\">\n        <button onclick=\"{{ toggleDarkMode }}\" title=\"Mørkt tema\" style=\"width:34px; height:34px; border:1px solid #2c405c; background:#1b2d46; color:#cdd9e8; border-radius:8px; cursor:pointer; font-size:15px; line-height:1\">{{ darkToggleLabel }}<\u002Fbutton>\n        <button onclick=\"{{ refreshNow }}\" title=\"Opdatér\" style=\"width:34px; height:34px; border:1px solid #2c405c; background:#1b2d46; color:#cdd9e8; border-radius:8px; cursor:pointer; font-size:15px; line-height:1\"><span style=\"{{ refreshSpinStyle }}\">⟳<\u002Fspan><\u002Fbutton>\n        <button onclick=\"{{ openSettings }}\" title=\"Kategorier &amp; tilstand\" style=\"width:34px; height:34px; border:1px solid #2c405c; background:#1b2d46; color:#cdd9e8; border-radius:8px; cursor:pointer; font-size:15px; line-height:1\">⚙<\u002Fbutton>\n        <button onclick=\"{{ logout }}\" title=\"Log ud\" style=\"width:34px; height:34px; border:1px solid #2c405c; background:#1b2d46; color:#cdd9e8; border-radius:8px; cursor:pointer; font-size:13px\">⏻<\u002Fbutton>\n        <button onclick=\"{{ openCount }}\" title=\"Tæl op\" style=\"width:34px; height:34px; border:1px solid #2c405c; background:#1b2d46; color:#cdd9e8; border-radius:8px; cursor:pointer; font-size:14px\">☑<\u002Fbutton>\n        <div style=\"position:relative\">\n          <button onclick=\"{{ toggleMobileAddMenu }}\" style=\"{{ addBtnStyle }}\">+ Ny<\u002Fbutton>\n          <sc-if value=\"{{ mobileAddMenuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div onclick=\"{{ stopProp }}\" style=\"position:absolute; top:calc(100% + 6px); right:0; background:var(--surface); border:1px solid var(--border); border-radius:9px; box-shadow:0 10px 28px rgba(0,0,0,0.28); z-index:60; overflow:hidden; min-width:172px\">\n              <button onclick=\"{{ mobileAddMenuNewItem }}\" style=\"display:block; width:100%; padding:11px 14px; font-size:13px; font-weight:600; color:var(--text); background:transparent; border:none; border-bottom:1px solid var(--border-soft); cursor:pointer; text-align:left\">Ny vare<\u002Fbutton>\n              <button onclick=\"{{ mobileAddMenuPlaceringer }}\" style=\"display:block; width:100%; padding:11px 14px; font-size:13px; font-weight:600; color:var(--text); background:transparent; border:none; cursor:pointer; text-align:left\">Placeringer<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:8px\">\n      <input value=\"{{ query }}\" onchange=\"{{ onQuery }}\" placeholder=\"Søg navn, mærke, model, kasse …\" style=\"flex:1; min-width:0; padding:9px 12px; font-size:16px; border:1px solid #2c405c; border-radius:8px; background:#0f1d30; color:#f4f3f1\">\n      <button onclick=\"{{ openMobileFilter }}\" style=\"{{ mobileFilterBtnStyle }}\">Filter{{ mobileFilterCountTxt }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"flex:none; padding:8px 14px; font-size:12px; color:var(--text-secondary); background:var(--panel); border-bottom:1px solid var(--border)\">{{ summaryTxt }}<\u002Fdiv>\n\n  <!-- ===== Mobile Lager list ===== -->\n  <sc-if value=\"{{ isLager }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1; overflow-y:auto; padding:2px 14px 90px\">\n      <sc-for list=\"{{ mobileRows }}\" as=\"r\" hint-placeholder-count=\"8\">\n        <div style=\"{{ r.cardStyle }}\">\n          <div onclick=\"{{ r.onOpen }}\" style=\"flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; cursor:pointer\">\n            <div style=\"font-weight:700; color:var(--heading); font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">{{ r.navn }}<\u002Fdiv>\n            <div style=\"font-size:11.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">{{ r.sub }}<\u002Fdiv>\n            <div style=\"display:flex; gap:8px; align-items:center; flex-wrap:wrap\">\n              <span style=\"font-size:11px; color:var(--muted)\">{{ r.kategori }}<\u002Fspan>\n              <span style=\"font-size:11px; color:var(--muted)\">· {{ r.plac }}<\u002Fspan>\n              <div style=\"position:relative\">\n                <button onclick=\"{{ r.onTilstandClick }}\" style=\"{{ r.tilstandBtnStyle }}\">{{ r.tilstand }}<\u002Fbutton>\n                <sc-if value=\"{{ r.tilstandPickerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div onclick=\"{{ stopProp }}\" style=\"position:absolute; top:calc(100% + 4px); left:0; z-index:50; background:var(--surface); border:1px solid var(--border); border-radius:8px; box-shadow:0 10px 26px rgba(0,0,0,0.25); padding:6px; display:flex; flex-direction:column; gap:2px; min-width:130px\">\n                    <sc-for list=\"{{ r.tilstandOptions }}\" as=\"o\" hint-placeholder-count=\"4\">\n                      <button onclick=\"{{ o.onClick }}\" style=\"{{ o.rowStyle }}\">{{ o.navn }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                    <div style=\"border-top:1px solid var(--border-soft); margin-top:2px; padding-top:2px\">\n                      <button onclick=\"{{ r.onRemoveTilstand }}\" style=\"display:block; width:100%; padding:7px 8px; border:none; background:transparent; border-radius:6px; cursor:pointer; text-align:left; font-size:12.5px; font-family:inherit; color:#A33\">Fjern tilstand<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; flex:none\">\n            <button onclick=\"{{ r.onDec }}\" style=\"{{ stepperBtnStyle }}\">−<\u002Fbutton>\n            <span style=\"min-width:30px; text-align:center; font-weight:700; font-size:14px; font-variant-numeric:tabular-nums;  null,\n      refreshing: false\n    };\n  }\n\n  initSb() {\n    if (this.sb) return this.sb;\n    try {\n      if (!window.supabase || !window.supabase.createClient) return null;\n      this.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { storage: authStorage, persistSession: true, autoRefreshToken: true } });\n    } catch (e) { return null; }\n    return this.sb;\n  }\n\n  onResize = () => {\n    const m = window.innerWidth < 860;\n    if (m !== this.state.isMobile) this.setState({ isMobile: m });\n  };\n\n  componentDidMount() {\n    window.addEventListener('resize', this.onResize);\n    this.applyTheme();\n    const sb = this.initSb();\n    if (!sb) { this.setState({ authChecking: false }); return; }\n    sb.auth.getSession().then(({ data }) => {\n      const loggedIn = !!(data && data.session);\n      this.setState({ loggedIn, authChecking: false });\n      if (loggedIn) this.initSync();\n    }).catch(() => this.setState({ authChecking: false }));\n    this.authListener = sb.auth.onAuthStateChange((event, session) => {\n      const loggedIn = !!session;\n      if (loggedIn !== this.state.loggedIn) {\n        this.setState({ loggedIn });\n        if (loggedIn) this.initSync();\n      }\n    });\n  }\n  componentDidUpdate() { this.applyTheme(); }\n  applyTheme() {\n    try { document.documentElement.setAttribute('data-theme', this.state.darkMode ? 'dark' : 'light'); } catch (e) {}\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this.onResize);\n    if (this.sbChannel) { try { this.sb.removeChannel(this.sbChannel); } catch (e) {} }\n  }\n\n  refreshNow() {\n    if (!this.sb) { this.initSb(); this.initSync(); return; }\n    this.setState({ refreshing: true });\n    this.sb.from(SB_TABLE).select('*').eq('id', SB_ROW_ID).maybeSingle()\n      .then(({ data, error }) => {\n        if (!error && data) {\n          this.applyingRemote = true;\n          this.setState({\n            items: Array.isArray(data.items) ? data.items : this.state.items,\n            kategorier: Array.isArray(data.kategorier) && data.kategorier.length ? data.kategorier : this.state.kategorier,\n            maerker: Array.isArray(data.maerker) ? data.maerker : this.state.maerker,\n            modeller: Array.isArray(data.modeller) ? data.modeller : this.state.modeller,\n            placeringer: Array.isArray(data.placeringer) && data.placeringer.length ? data.placeringer : this.state.placeringer\n          }, () => { this.applyingRemote = false; this.cacheLocal(); });\n        }\n      })\n      .catch(() => {})\n      .then(() => { setTimeout(() => this.setState({ refreshing: false }), 350); });\n  }\n\n  initSync() {\n    const sb = this.initSb();\n    if (!sb) return;\n    this.applyingRemote = false;\n    this.sb.from(SB_TABLE).select('*').eq('id', SB_ROW_ID).maybeSingle()\n      .then(({ data, error }) => {\n        if (error) { console.warn('Supabase load fejlede:', error.message); return; }\n        if (data) {\n          this.applyingRemote = true;\n          this.setState({\n            items: Array.isArray(data.items) && data.items.length ? data.items : this.state.items,\n            kategorier: Array.isArray(data.kategorier) && data.kategorier.length ? data.kategorier : this.state.kategorier,\n            maerker: Array.isArray(data.maerker) ? data.maerker : this.state.maerker,\n            modeller: Array.isArray(data.modeller) ? data.modeller : this.state.modeller,\n            placeringer: Array.isArray(data.placeringer) && data.placeringer.length ? data.placeringer : this.state.placeringer\n          }, () => { this.applyingRemote = false; this.cacheLocal(); });\n        } else {\n          this.pushRemote();\n        }\n        this.subscribeRemote();\n      })\n      .catch(() => {});\n  }\n\n  subscribeRemote() {\n    this.sbChannel = this.sb.channel('lagerpro-sync')\n      .on('postgres_changes', { event: '*', schema: 'public', table: SB_TABLE, filter: 'id=eq.' + SB_ROW_ID }, (payload) => {\n        const row = payload.new;\n        if (!row) return;\n        this.applyingRemote = true;\n        this.setState({\n          items: Array.isArray(row.items) ? row.items : this.state.items,\n          kategorier: Array.isArray(row.kategorier) ? row.kategorier : this.state.kategorier,\n          maerker: Array.isArray(row.maerker) ? row.maerker : this.state.maerker,\n          modeller: Array.isArray(row.modeller) ? row.modeller : this.state.modeller,\n          placeringer: Array.isArray(row.placeringer) && row.placeringer.length ? row.placeringer : this.state.placeringer\n        }, () => { this.applyingRemote = false; this.cacheLocal(); });\n      })\n      .subscribe();\n  }\n\n  cacheLocal() {\n    try { localStorage.setItem('asg-lagerpro-v2', JSON.stringify({ items: this.state.items, kategorier: this.state.kategorier, maerker: this.state.maerker, modeller: this.state.modeller, placeringer: this.state.placeringer })); } catch (e) {}\n  }\n\n  pushRemote() {\n    if (!this.sb) return;\n    const S = this.state;\n    const payload = { id: SB_ROW_ID, items: S.items, kategorier: S.kategorier, maerker: S.maerker, modeller: S.modeller, placeringer: S.placeringer, updated_at: new Date().toISOString() };\n    this.sb.from(SB_TABLE).upsert(payload)\n      .then(({ error }) => {\n        if (error && error.code === 'PGRST204') {\n          // remote table doesn't have the newer 'placeringer' column yet — retry without it so the rest still syncs\n          const fallback = { ...payload }; delete fallback.placeringer;\n          this.sb.from(SB_TABLE).upsert(fallback)\n            .then(({ error: e2 }) => { if (e2) console.warn('Supabase gem fejlede:', e2.message); })\n            .catch(() => {});\n          return;\n        }\n        if (error) console.warn('Supabase gem fejlede:', error.message);\n      })\n      .catch(() => {});\n  }\n\n  async submitLogin(e) {\n    if (e && e.preventDefault) e.preventDefault();\n    const uRaw = (this.state.loginUser || '').trim().toLowerCase();\n    const p = this.state.loginPass || '';\n    if (!uRaw || !p) { this.setState({ loginError: 'Udfyld brugernavn og kode.' }); return; }\n    const email = uRaw.includes('@') ? uRaw : uRaw + '@' + LOGIN_EMAIL_DOMAIN;\n    const sb = this.initSb();\n    if (!sb) { this.setState({ loginError: 'Kunne ikke forbinde til login-tjenesten.' }); return; }\n    this.setState({ loginBusy: true, loginError: '' });\n    __rememberFlag = this.state.rememberMe;\n    try {\n      const { error } = await sb.auth.signInWithPassword({ email, password: p });\n      if (error) {\n        this.setState({ loginBusy: false, loginError: 'Forkert brugernavn eller kode.' });\n        return;\n      }\n      this.setState({ loggedIn: true, loginBusy: false, loginError: '', loginPass: '' });\n    } catch (err) {\n      this.setState({ loginBusy: false, loginError: 'Kunne ikke logge ind. Tjek forbindelsen.' });\n    }\n  }\n\n  quickAdjust(id, delta) {\n    const now = this.nowISO();\n    this.update(id, it => {\n      const nyAntal = Math.max(0, it.antal + delta);\n      const d = nyAntal - it.antal;\n      if (d === 0) return it;\n      return { ...it, antal: nyAntal, opdateret: now, tx: [{ ts: now, type: d > 0 ? 'Tilgang' : 'Afgang', delta: d, note: 'Hurtig justering (mobil)', bruger: USER }, ...it.tx] };\n    });\n  }\n\n  defaultKategorier() {\n    return [\n      { navn: 'Mus', tilstand: true }, { navn: 'Tastaturer', tilstand: true }, { navn: 'Skærme', tilstand: true },\n      { navn: 'Telefoner', tilstand: true }, { navn: 'Kabler', tilstand: false }, { navn: 'Opladere', tilstand: false },\n      { navn: 'Docks', tilstand: true }, { navn: 'Headsets', tilstand: true }, { navn: 'Adaptere', tilstand: false },\n      { navn: 'Strips & div.', tilstand: false }\n    ];\n  }\n\n  seed() {\n    let id = 1;\n    // [navn, kat, maerke, model, antal, kasse(1-20), tilstand, lev, pris, koeb, garanti, tagsCsv, note, serial]\n    const T = [\n      ['Logitech MX Master 3S', ).toLocaleString('da-DK') + ' kr'; }\n  fmtDate(iso) { if (!iso) return '—'; const d = new Date(iso); if (isNaN(d)) return '—'; return d.toLocaleDateString('da-DK', { day: '2-digit', month: 'short', year: 'numeric' }); }\n  fmtDateTime(iso) { const d = new Date(iso); if (isNaN(d)) return iso; return d.toLocaleDateString('da-DK', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' ' + d.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit' }); }\n\n  catTracks(navn) { const c = this.state.kategorier.find(k => k.navn === navn); return c ? !!c.tilstand : false; }\n\n  setTilstand(id, val) {\n    const now = this.nowISO();\n    const items = this.state.items.map(it => it.id === id ? { ...it, tilstand: val, opdateret: now, tx: [{ ts: now, type: 'Redigeret', delta: 0, note: val ? ('Tilstand sat til ' + val) : 'Tilstand fjernet', bruger: USER }, ...it.tx] } : it);\n    this.persist({ items, tilstandPickerId: null });\n  }\n\n  persist(patch) {\n    const next = { ...this.state, ...patch };\n    this.setState(patch);\n    try { localStorage.setItem('asg-lagerpro-v2', JSON.stringify({ items: next.items, kategorier: next.kategorier, maerker: next.maerker, modeller: next.modeller, placeringer: next.placeringer })); } catch (e) {}\n    if (!this.applyingRemote) this.pushRemote();\n  }\n  saveItems(items) { this.persist({ items }); }\n  update(id, fn) { this.saveItems(this.state.items.map(it => it.id === id ? fn(it) : it)); }\n\n  blankForm() {\n    const firstCat = this.state.kategorier[0] ? this.state.kategorier[0].navn : '';\n    const firstPlac = this.state.placeringer[0] || 'Kasse 1';\n    return { id: null, navn: '', kategori: firstCat, maerke: '', model: '', serienr: '', antal: 1, enhed: 'stk', plac: firstPlac, tilstand: 'Ny', leverandor: '', stykpris: 0, koebsdato: this.nowISO().slice(0, 10), garanti: '', tags: '', note: '' };\n  }\n  setForm(key, val) { this.setState(s => ({ form: { ...s.form, [key]: val } })); }\n\n  renderVals() {\n    const S = this
